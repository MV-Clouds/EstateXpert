<template>
    <div class="container">
        <!-- Header: search + buttons -->
        <div class="header">
            <div class="search-input">
                <lightning-input
                    type="search"
                    value={searchValue}
                    onchange={handleSearch}
                    placeholder="Search Checklist..."
                    variant="label-hidden"
                    class="search_Input">
                </lightning-input>
            </div>
            <div class="buttons">
                <button class="blue-btn-css" onclick={refreshTable}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 3V8M21 8H16M21 8L18 5.29168C16.4077 3.86656 14.3051 3 12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21C16.2832 21 19.8675 18.008 20.777 14"
                            stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Refresh
                </button>
                <template if:true={checklistEditable}>
                    <button class="blue-btn-css" onclick={handleShowEditModal}>
                        <svg width="16" height="16" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2 16H3.425L13.2 6.225L11.775 4.8L2 14.575V16ZM0 18V13.75L13.2 0.575C13.4 0.391667 13.621 0.25 13.863 0.15C14.105 0.0500001 14.359 0 14.625 0C14.891 0 15.1493 0.0500001 15.4 0.15C15.6507 0.25 15.8673 0.4 16.05 0.6L17.425 2C17.625 2.18333 17.771 2.4 17.863 2.65C17.955 2.9 18.0007 3.15 18 3.4C18 3.66667 17.9543 3.921 17.863 4.163C17.7717 4.405 17.6257 4.62567 17.425 4.825L4.25 18H0ZM12.475 5.525L11.775 4.8L13.2 6.225L12.475 5.525Z"
                            fill="white"/>
                        </svg>
                        {buttonLabel}
                    </button>
                </template>
            </div>
        </div>

        <!-- Content -->
        <template if:true={isDataAvailable}>
            <div class="columns-container">
                <!-- PENDING Column -->
                <div class="column">
                    <div class="column-header pending-header">
                        <span class="column-dot dot-pending"></span>
                        <span class="column-title">PENDING</span>
                        <span class="column-count">{pendingCount}</span>
                    </div>
                    <div class="cards-list">
                        <template for:each={pendingItems} for:item="item">
                            <div key={item.id} class="checklist-card">
                                <div class="card-top-row">
                                    <div class="card-left">
                                        <template if:true={item.fieldName}>
                                            <input type="checkbox" class="custom-checkbox" checked={item.completed} />
                                        </template>
                                        <template if:false={item.fieldName}>
                                            <input type="checkbox"
                                                data-id={item.id}
                                                data-fieldname={item.fieldName}
                                                checked={item.completed}
                                                onchange={handleCheckboxChange} />
                                        </template>
                                        <span class="card-name">{item.name}</span>
                                    </div>
                                    <div class="card-badges">
                                        <template if:true={item.fieldName}>
                                            <label class="badge badge-auto">Auto-Selected</label>
                                        </template>
                                        <template if:false={item.fieldName}>
                                            <label class="badge badge-user">User-Selected</label>
                                        </template>
                                    </div>
                                </div>

                                <!-- Condition row: always show when fieldName exists -->
                                <template if:true={item.fieldName}>
                                    <div class="card-condition">
                                        <span class="cond-label">Condition:</span>
                                        {item.fieldLabel} should {item.operator}
                                        <template if:true={item.isToRequired}> to </template>
                                        {item.displayValueToShow}
                                    </div>
                                </template>
                                <!-- No-condition note: show when no fieldName -->
                                <template if:false={item.fieldName}>
                                    <div class="card-condition no-condition">
                                        <span class="cond-label">Note:</span>
                                        There is no condition defined for completion.
                                    </div>
                                </template>
                                <!-- Description: always show when present, regardless of condition -->
                                <template if:true={item.isDescription}>
                                    <div class="card-condition card-description">
                                        <span class="cond-label">Description:</span>
                                        {item.description}
                                    </div>
                                </template>

                                <!-- Status pill -->
                                <div class="card-status-row">
                                    <span class="status-dot dot-pending"></span>
                                    <span class="status-label pending-label">{item.statusText}</span>
                                </div>
                            </div>
                        </template>
                        <template if:false={hasPendingItems}>
                            <div class="empty-column">No pending items</div>
                        </template>
                    </div>
                </div>

                <!-- COMPLETED Column -->
                <div class="column">
                    <div class="column-header completed-header">
                        <span class="column-dot dot-completed"></span>
                        <span class="column-title">COMPLETED</span>
                        <span class="column-count">{completedCount}</span>
                    </div>
                    <div class="cards-list">
                        <template for:each={completedItems} for:item="item">
                            <div key={item.id} class="checklist-card card-completed">
                                <div class="card-top-row">
                                    <div class="card-left">
                                        <template if:true={item.fieldName}>
                                            <input type="checkbox" class="custom-checkbox" checked={item.completed} />
                                        </template>
                                        <template if:false={item.fieldName}>
                                            <input type="checkbox"
                                                data-id={item.id}
                                                data-fieldname={item.fieldName}
                                                checked={item.completed}
                                                onchange={handleCheckboxChange} />
                                        </template>
                                        <span class="card-name">{item.name}</span>
                                    </div>
                                    <div class="card-badges">
                                        <template if:true={item.fieldName}>
                                            <label class="badge badge-auto">Auto-Selected</label>
                                        </template>
                                        <template if:false={item.fieldName}>
                                            <label class="badge badge-user">User-Selected</label>
                                        </template>
                                    </div>
                                </div>

                                <!-- Condition row: always show when fieldName exists -->
                                <template if:true={item.fieldName}>
                                    <div class="card-condition">
                                        <span class="cond-label">Condition:</span>
                                        {item.fieldLabel} should {item.operator}
                                        <template if:true={item.isToRequired}> to </template>
                                        {item.displayValueToShow}
                                    </div>
                                </template>
                                <!-- No-condition note: show when no fieldName -->
                                <template if:false={item.fieldName}>
                                    <div class="card-condition no-condition">
                                        <span class="cond-label">Note:</span>
                                        There is no condition defined for completion.
                                    </div>
                                </template>
                                <!-- Description: always show when present, regardless of condition -->
                                <template if:true={item.isDescription}>
                                    <div class="card-condition card-description">
                                        <span class="cond-label">Description:</span>
                                        {item.description}
                                    </div>
                                </template>

                                <!-- Status pill -->
                                <div class="card-status-row">
                                    <span class="status-dot dot-completed"></span>
                                    <span class="status-label completed-label">{item.statusText}</span>
                                </div>
                            </div>
                        </template>
                        <template if:false={hasCompletedItems}>
                            <div class="empty-column">No completed items</div>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- Empty state -->
        <template if:false={isDataAvailable}>
            <div class="empty-state">
                <div class="empty-state__content">
                    <div class="empty-state__icon">
                        <img src="/resource/MVEX__emptyState" alt="" draggable="false">
                    </div>
                    <div class="empty-state__message">No Checklist available for this object, please create a checklist first.</div>
                </div>
            </div>
        </template>
    </div>

    <lightning-layout>
        <template if:true={showEditModal}>
            <c-edit-check-list-modal
                onhidepopup={handleHideEditPopup}
                onhidepopupandrefresh={handleHideEditPopupAndRefresh}
                object-name={objectName}
                record-id={recordId}>
            </c-edit-check-list-modal>
        </template>
    </lightning-layout>

    <template if:true={isSpinner}>
        <c-spinner-component></c-spinner-component>
    </template>
</template>
