<template>
    <template if:true={isLoading}>
        <div class="spinner-overlay">
            <c-spinner-component></c-spinner-component>
        </div>
    </template>

    <template if:false={showFlowBuilder}>
        <div class="main-container">
            <div class="main_header_cls">
                <div class="sub_main_header_css">
                    <div slot="title" class="header_block_css">
                        <div class="svg_back_icon" onclick={handleDiscard}>
                            <svg width="26" height="22" viewBox="0 0 30 26" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M28.3334 24.224C25.0711 20.2418 22.1742 17.9822 19.6427 17.4454C17.1111 16.9085 14.7009 16.8274 12.412 17.202V24.3334L1.66669 12.6967L12.412 1.66669V8.44469C16.6445 8.47802 20.2427 9.99646 23.2067 13C26.1702 16.0036 27.8791 19.7449 28.3334 24.224Z"
                                    fill="#131314" stroke="#131314" stroke-width="2" stroke-linejoin="round" />
                            </svg>
                        </div>
                        <div class="portal_mapping">
                            Create Flow
                        </div>
                    </div>
                    <div class="header">
                        <button class="btn" onclick={handleCreate}>
                            <svg fill="#ffffff" height="14" width="14" version="1.1" id="Layer_1"
                                xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
                                viewBox="0 0 512.01 512.01" xml:space="preserve" stroke="#ffffff">
                                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                                <g id="SVGRepo_iconCarrier">
                                    <g>
                                        <g>
                                            <path
                                                d="M505.754,240.923L271.088,6.256c-3.989-4.011-9.408-6.251-15.083-6.251H21.338c-8.619,0-16.427,5.184-19.712,13.163 c-3.307,7.979-1.472,17.152,4.629,23.253l219.584,219.584L6.256,475.59c-6.101,6.101-7.936,15.275-4.629,23.253 c3.285,7.979,11.093,13.163,19.712,13.163h234.667c5.675,0,11.093-2.24,15.083-6.251l234.667-234.667 C514.096,262.747,514.096,249.264,505.754,240.923z">
                                            </path>
                                        </g>
                                    </g>
                                </g>
                            </svg>
                            Create
                        </button>
                    </div>
                </div>
            </div>
            <div class="flow-container-class">
                <div class="flow-container container-padding">
                    <div class="form-container margin-top-medium">
                        <div class="form-field">
                            <label class="form-label" for="flowName">Enter Flow Name <span class="required-marker">*</span></label>
                            <input type="text" id="flowName" data-id="flow-name-input" class="form-input" value={flowName} maxlength="150" placeholder="WBC Flow 1" oninput={handleInputChange} onblur={handleInputBlur} required/>
                            <p class="char-count tempname-count">{flowName.length}/{maxFlowNameLength}</p>
                        </div>
                        <template if:true={headerNameLengthError}>
                            <div style="color: #b3042b;"> Header text cannot exceed {maxFlowNameLength} characters.</div>
                        </template>

                        
                        <label class="form-label" for="flowName">Categories <span class="required-marker">*</span></label>
                        <div class="combobox-wrapper">
                            <lightning-combobox
                                data-id="category-combobox"
                                name="categories"
                                label="Select Categories"
                                variant="label-hidden"
                                value={selectedCategory}
                                options={typeOptions}
                                onchange={handleCategories}
                                required>
                            </lightning-combobox>
                        </div>

                        <template if:true={hasSelectedCategories}>
                            <div class="selected-categories margin-top-small pills-wrapper">
                                <template for:each={selectedCategories} for:item="category">
                                    <lightning-pill
                                        key={category}
                                        label={category}
                                        name={category}
                                        onremove={handleRemoveCategory}>
                                    </lightning-pill>
                                </template>
                            </div>
                        </template>
                        
                        <div class="form-field margin-top-medium">
                            <label class="form-label">Template Type</label>
                            <div class="radio-group radio-wrapper">
                                <template for:each={templateTypeOptions} for:item="option" for:index="index">
                                    <div class="radio-item" key={option.value}>
                                        <div class="radio">
                                            <lightning-input 
                                                type="radio" 
                                                class="radio-name" 
                                                name="templateType" 
                                                value={option.value} 
                                                label={option.label} 
                                                checked={option.checked}
                                                onchange={handleTypeChange}>
                                            </lightning-input>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                    
                    <div class="decorative-hr"></div>

                    <div class="note-section note-container margin-top-large">
                        <p class="note-text">
                            <strong>Note:</strong><br>When utilising template flow JSON, you are responsible for customising the experience to suit your use case, adhering to applicable laws and complying with WhatsApp Business Messaging Policy.
                        </p>
                    </div>
                </div>
                <div class="previewFlow">
                    <c-wb-flow-preview flowname={flowName} jsonstringdata={jsonString}></c-wb-flow-preview>
                </div>
            </div>
        </div>
    </template>

    <template if:true={showFlowBuilder}>
        <div class="flow-builder-container">
            <div class="main_header_cls">
                <div class="sub_main_header_css">
                    <div slot="title" class="header_block_css">
                        <div class="svg_back_icon" onclick={handleBackToForm}>
                            <svg width="26" height="22" viewBox="0 0 30 26" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M28.3334 24.224C25.0711 20.2418 22.1742 17.9822 19.6427 17.4454C17.1111 16.9085 14.7009 16.8274 12.412 17.202V24.3334L1.66669 12.6967L12.412 1.66669V8.44469C16.6445 8.47802 20.2427 9.99646 23.2067 13C26.1702 16.0036 27.8791 19.7449 28.3334 24.224Z"
                                    fill="#131314" stroke="#131314" stroke-width="2" stroke-linejoin="round" />
                            </svg>
                        </div>
                        <div class="portal_mapping">
                            {flowName}
                        </div>
                    </div>
                    <div class="header-actions">
                        <button class="btn" disabled={isSaveDisabled} onclick={handleSaveFlow}>
                            <svg fill="#ffffff" height="14" width="14" version="1.1" id="Layer_3"
                                xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
                                viewBox="0 0 512.01 512.01" xml:space="preserve" stroke="#ffffff">
                                <g id="SVGRepo_bgCarrier2" stroke-width="0"></g>
                                <g id="SVGRepo_tracerCarrier2" stroke-linecap="round" stroke-linejoin="round"></g>
                                <g id="SVGRepo_iconCarrier2">
                                    <g>
                                        <g>
                                            <path
                                                d="M505.754,240.923L271.088,6.256c-3.989-4.011-9.408-6.251-15.083-6.251H21.338c-8.619,0-16.427,5.184-19.712,13.163 c-3.307,7.979-1.472,17.152,4.629,23.253l219.584,219.584L6.256,475.59c-6.101,6.101-7.936,15.275-4.629,23.253 c3.285,7.979,11.093,13.163,19.712,13.163h234.667c5.675,0,11.093-2.24,15.083-6.251l234.667-234.667 C514.096,262.747,514.096,249.264,505.754,240.923z">
                                            </path>
                                        </g>
                                    </g>
                                </g>
                            </svg>
                            Save
                        </button>
                        <button class="btn" disabled={isPublishDisabled} onclick={handlePublishFlow}>
                            <svg fill="#ffffff" height="14" width="14" version="1.1" id="Layer_2"
                                xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
                                viewBox="0 0 512.01 512.01" xml:space="preserve" stroke="#ffffff">
                                <g id="SVGRepo_bgCarrier3" stroke-width="0"></g>
                                <g id="SVGRepo_tracerCarrier3" stroke-linecap="round" stroke-linejoin="round"></g>
                                <g id="SVGRepo_iconCarrier3">
                                    <g>
                                        <g>
                                            <path
                                                d="M505.754,240.923L271.088,6.256c-3.989-4.011-9.408-6.251-15.083-6.251H21.338c-8.619,0-16.427,5.184-19.712,13.163 c-3.307,7.979-1.472,17.152,4.629,23.253l219.584,219.584L6.256,475.59c-6.101,6.101-7.936,15.275-4.629,23.253 c3.285,7.979,11.093,13.163,19.712,13.163h234.667c5.675,0,11.093-2.24,15.083-6.251l234.667-234.667 C514.096,262.747,514.096,249.264,505.754,240.923z">
                                            </path>
                                        </g>
                                    </g>
                                </g>
                            </svg>
                            Publish
                        </button>
                    </div>
                </div>
            </div>
            <div class="flow-builder-panels">
                <div class="panel left-panel">
                    <c-wb-flow-screen-navigation 
                        json-data={jsonString}
                        selected-screen-id={selectedScreenId}
                        onaddscreen={handleScreenAdded}
                        ondeletescreen={handleScreenDeleted}
                        onscreenselect={handleScreenSelected}
                        onreorderscreen={handleScreenReordered}>
                    </c-wb-flow-screen-navigation>
                </div>
                <div class="panel middle-panel">
                    <c-wb-flow-screen-editor 
                        json-data={jsonString}
                        current-screen-id={selectedScreenId}
                        parent-flow-id={parentFlowId}
                        is-parent-flow={isParentFlow}
                        oncontentupdate={handleContentUpdate}
                        oneditreadmore={handleEditReadMore}
                        ondeletereadmore={handleDeleteReadMore}
                        onshowerror={handleShowError}>
                    </c-wb-flow-screen-editor>
                </div>
                <div class="panel right-panel">
                    <c-wb-flow-preview flowname={flowName} jsonstringdata={jsonString} currentscreenid={selectedScreenId}></c-wb-flow-preview>
                </div>
            </div>
        </div>
    </template>
</template>
