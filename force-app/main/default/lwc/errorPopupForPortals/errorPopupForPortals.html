<template>
    <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-01"
        class="slds-modal slds-fade-in-open slds-modal_small">
        <div class="slds-modal__container">
            <div class="slds-modal__close closs_icon_css" onclick={handleCloseModal}>
                <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                    d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z"
                    fill="#1F2937" />
                </svg>
            </div>    

            <div class="slds-modal__header blue-header">
                <h1 id="modal-heading-01" class="slds-modal__title slds-hyphenate" tabindex="-1">List of Errors</h1>
            </div>
            <div class="slds-modal__content border_css" id="modal-content-id-1">
                <div class="body_container">
                    <div class="header_container_css">
                        <svg width="30" height="22" viewBox="0 0 40 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21.8182 20.2105H18.1818V11.7895H21.8182V20.2105ZM21.8182 26.9474H18.1818V23.5789H21.8182V26.9474ZM0 32H40L20 0L0 32Z" fill="#EF665B"/>
                        </svg>
                        <p>Failed to {type} the listing on the {portalname} portal.</p>    
                    </div>
                    <div class="main_content_cls">
                        <div class="table-content">
                            <table aria-multiselectable="true"
                        class="slds-table">
                                <thead>
                                    <tr class="table_tr_cls">
                                        <th class="header-cell message-col">{firstHeader}</th>
                                        <th class="header-cell path-col">{secondHeader}</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={errors} for:item="error">
                                        <tr key={error.path}>
                                            <td class="message-col slds-truncate">
                                                <template if:true={error.message}>
                                                    {error.message}
                                                </template>
                                                <template if:false={error.message}>
                                                    -
                                                </template>
                                            </td>
                                            <td class="path-col slds-truncate">
                                                <template if:true={error.path}>
                                                    {error.path}
                                                </template>
                                                <template if:false={error.path}>
                                                    -
                                                </template>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="footerbtns">
                    <button class="blue-btn-css" onclick={handleCloseModal}>
                        <svg width="14" height="14" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z" fill="currentColor"/>
                        </svg>
                        Close
                    </button>
                </div>
            </div>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
</template>
