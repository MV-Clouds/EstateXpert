<template>
    <section class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
            <header class="slds-modal__header custom-header">
                <h2 class="slds-text-heading_medium">Select an existing flow</h2>
            </header>

            <div class="slds-modal__content slds-p-around_medium slds-grid slds-gutters">
                <template if:false={flowDataAvailable}>
                    <h1 style="font-weight: bold;">No published flows found.</h1>
                </template>
                <template if:true={flowDataAvailable}>
                
                <!-- Left Section: Flow Selection -->
                <div class="slds-col slds-size_1-of-3">
                    <lightning-input type="search" label="Search" class="slds-m-bottom_medium search-box" placeholder="Search by name..." onchange={handleSearch}></lightning-input>

                    <div class="flow-list-container">
                        <template if:true={filteredFlows}>
                            <template for:each={filteredFlows} for:item="flow">
                                <div key={flow.id} class="flow-item">
                                    <input type="radio" id={flow.id} name="flows" value={flow.id} checked={flow.isSelected} onchange={handleFlowChange} class="flow-radio" />
                                    <label for={flow.id} class="flow-label">
                                        <span class="flow-radio-circle"></span>
                                        <div class="flow-info">
                                            <span class="flow-name">{flow.name}</span>
                                            <div class="flow-date">Published • {flow.date}</div>
                                        </div>
                                    </label>
                                </div>
                            </template>
                        </template>
                        <template if:false={filteredFlows}>
                            <div class="flow-empty-message">
                                <p>No flows found.</p>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="slds-col slds-size_2-of-3 slds-box preview-pane" style="display: flex; justify-content: center; align-items: center;">
                    <div class="preview-container" style="width: 280px; height: 100%; border: 1px solid #ccc; border-radius: 8px; overflow: hidden; box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);">
                        <template if:true={iframeSrc}>
                            <iframe src={iframeSrc} class="iframe-preview"></iframe>
                        </template>
                        <template if:false={iframeSrc}>
                            <div class="slds-context-bar__icon-action slds-text-align--center slds-text-heading--medium" style="height: 900px;">
                                Please select the flow
                            </div>
                        </template>
                    </div>
                </div>
            </template>
            </div>

            <footer class="slds-modal__footer custom-footer">
                <button class="flow-btn flow-btn-cancel" onclick={handleClose}>Cancel</button>
                <button class="flow-btn flow-btn-submit" onclick={handleSubmit} disabled={isSubmitDisabled}>Submit</button>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
