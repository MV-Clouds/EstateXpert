<template>
    <template if:true={isLoading}>
        <c-spinner-component></c-spinner-component>
    </template>
    <div class="wrapper">
        <div class="main_content_cls">
            <div class="slds-m-around_medium navbar">
                <div class="save-btn">
                    <button onclick={addNewPair} class="blue-btn-css">
                        <svg width="14" height="14" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M10 2V18M2 10H18" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                        Add
                    </button>
                    <button onclick={openManageFieldsModal} class="blue-btn-css">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 7H20M4 12H20M4 17H14" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        Manage {integrationLabel} Fields
                    </button>
                    <button disabled={savebutton} onclick={handleAddPairClick} class="blue-btn-css">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M9 16.17L4.83 12L3.41 13.41L9 19L21 7L19.59 5.59L9 16.17Z" fill="currentColor" />
                        </svg>
                        Save Mapping
                    </button>
                </div>
            </div>

            <template if:true={isDropDownpairAvailable}>    
                <div class="table-content">
                    <table class="slds-table">
                        <thead>
                            <tr class="table_tr_cls">
                                <th scope="col" class="sno">
                                    <div class="display_cls">No.</div>
                                </th>
                                <th scope="col" class="google-field">
                                    <div>{integrationLabel} Form Field</div>
                                </th>
                                <th scope="col" class="salesforce-field">
                                    <div>Salesforce Contact Field</div>
                                </th>
                                <th scope="col" class="actions">
                                    <div>Action</div>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={dropDownPairsWithIndex} for:item="pair" for:index="index">
                                <tr key={pair.displayIndex}>
                                    <td data-label="S.No.">
                                        <div class="index-display">{pair.displayIndex}</div>
                                    </td>
                                    <td data-label="Google Field" class="truncate_css">
                                        <div class="combobox_cls">
                                            <lightning-combobox label="Form Field" 
                                                options={pair.googleFieldOptions} 
                                                data-index={index} 
                                                value={pair.metaField} 
                                                onclick={newMethod}
                                                placeholder="Select Form Field"
                                                onchange={handleGoogleFieldChange} 
                                                dropdown-alignment="auto"
                                                variant="label-hidden">
                                            </lightning-combobox>
                                        </div>
                                    </td>
                                    <td data-label="Salesforce Field">
                                        <div class="combobox_cls">
                                            <lightning-combobox label="Salesforce Contact Field" 
                                                options={pair.salesforceOptions} 
                                                data-index={index} 
                                                value={pair.salesforceField} 
                                                placeholder="Select Salesforce Contact Field"
                                                onchange={handleSalesforceFieldChange} 
                                                dropdown-alignment="auto"
                                                variant="label-hidden">
                                            </lightning-combobox>
                                        </div>
                                    </td>
                                    <td data-label="Actions">
                                        <div class="action-btn">
                                            <button class="delete-div" data-id={index} onclick={deletePair}>
                                                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                    <path d="M2.62502 3.45834L3.32598 11.5194C3.40087 12.3807 4.12187 13.0417 4.98638 13.0417H9.01369C9.87819 13.0417 10.5992 12.3807 10.674 11.5194L11.375 3.45834M5.12502 3.25V2.625C5.12502 1.70453 5.87119 0.958336 6.79169 0.958336H7.20835C8.12885 0.958336 8.87502 1.70453 8.87502 2.625V3.25M1.16669 3.45834H12.8334" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
                                                </svg>                                                    
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>

            <template if:false={isDropDownpairAvailable}>
                <div class="no-data-container">
                    <img src="/resource/MVEX__emptyState" alt="" draggable="false">
                    <div class="no-data-message">No Data Found</div>
                </div>
            </template>
        </div>

        <template if:true={showManageFieldsModal}>
            <div class="slds-backdrop slds-backdrop_open"></div>
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-02" aria-modal="true"
                aria-describedby="modal-content-id-2" class="slds-modal slds-fade-in-open slds-modal_small">
                <div class="slds-modal__container">
                    <div class="slds-modal__close close-icon-css" onclick={closeManageFieldsModal}>
                        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z"
                                fill="#1F2937" />
                        </svg>
                    </div>
                    
                    <div class="slds-modal__header blue-header">
                        <h1 id="modal-heading-02" class="slds-modal__title slds-hyphenate" tabindex="-1">Manage {integrationLabel} Fields</h1>
                    </div>
                    <div class="slds-modal__content popdiv_cls slds-p-around_medium" id="modal-content-id-2">
                        <div class="slds-form-element slds-m-bottom_medium">
                            <lightning-input 
                                label="New Field Label" 
                                value={newGoogleFieldLabel} 
                                onchange={handleNewGoogleFieldChange}
                                placeholder="Enter field label (e.g., Custom Field 1)" required>
                            </lightning-input>
                            <lightning-input 
                                label="New Field Api Name" 
                                value={newGoogleFieldValue} 
                                onchange={handleNewGoogleFieldValueChange}
                                placeholder="Enter field api name (e.g., CUSTOM_FIELD_1)" required>
                            </lightning-input>
                            <button class="slds-m-top_small blue-btn-css" onclick={addGoogleField}>
                                <svg width="14" height="14" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M10 2V18M2 10H18" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" />
                                </svg>
                                Add Field
                            </button>
                        </div>
                        <div class="custom-accordion">
                            <button type="button" class="custom-accordion__header" onclick={toggleManageFieldsAccordion}
                                aria-expanded={isManageFieldsAccordionOpen}>
                                <span class="custom-accordion__title">Form Fields</span>
                                <svg class={manageFieldsChevronClass} width="16" height="16" viewBox="0 0 24 24" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" />
                                </svg>
                            </button>

                            <div class={manageFieldsAccordionBodyClass}>
                                    <template if:true={googleFieldOptions.length}>
                                        <div class="table-content popup-table-content">
                                            <table class="slds-table slds-table_cell-buffer">
                                                <thead>
                                                    <tr class="table_tr_cls">
                                                        <th scope="col">
                                                            <div>Field Label</div>
                                                        </th>
                                                        <th scope="col">
                                                            <div>Field Api Name</div>
                                                        </th>
                                                        <th scope="col" class="actions">
                                                            <div>Action</div>
                                                        </th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <template for:each={googleFieldOptions} for:item="field" for:index="index">
                                                        <tr key={field.value}>
                                                            <td data-label="Field Label">{field.label}</td>
                                                            <td data-label="Field Api Name">{field.value}</td>
                                                            <td data-label="Actions">
                                                                <div class="action-btn">
                                                                    <button class="delete-div" data-value={field.value}
                                                                        onclick={deleteGoogleField} disabled={field.disable}>
                                                                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
                                                                            xmlns="http://www.w3.org/2000/svg">
                                                                            <path d="M2.62502 3.45834L3.32598 11.5194C3.40087 12.3807 4.12187 13.0417 4.98638 13.0417H9.01369C9.87819 13.0417 10.5992 12.3807 10.674 11.5194L11.375 3.45834M5.12502 3.25V2.625C5.12502 1.70453 5.87119 0.958336 6.79169 0.958336H7.20835C8.12885 0.958336 8.87502 1.70453 8.87502 2.625V3.25M1.16669 3.45834H12.8334"
                                                                                stroke="currentColor" stroke-width="1.25"
                                                                                stroke-linecap="round" stroke-linejoin="round" />
                                                                        </svg>
                                                                    </button>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    </template>
                                                </tbody>
                                            </table>
                                        </div>
                                    </template>
                                    <template if:false={googleFieldOptions.length}>
                                        <div class="slds-text-align_center">No {integrationLabel} fields available</div>
                                    </template>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </template>

        <template if:true={showConfirmationModal}>
            <div class="slds-backdrop slds-backdrop_open"></div>
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
                aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open slds-modal_small">
                <div class="slds-modal__container">
                    <div class="slds-modal__close closs_icon_css" onclick={closeConfirmationModal}>
                        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z"
                                fill="#1F2937" />
                        </svg>
                    </div>
                    
                    <div class="slds-modal__header blue-header">
                        <h1 id="modal-heading-01" class="slds-modal__title slds-hyphenate" tabindex="-1">Confirmation</h1>
                    </div>
                    <div class="slds-modal__content popdiv_cls" id="modal-content-id-1">
                        <p class="slds-text-align_center con-msg">Are you sure you want to save the changes?</p>
                        <div class="footer_css">
                            <button class="white-btn-css" onclick={closeConfirmationModal}>
                                <svg width="14" height="14" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z"
                                        fill="currentColor" />
                                </svg>
                                Cancel
                            </button>
                            <button class="blue-btn-css" onclick={handleConfirmAddPair}>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M9 16.17L4.83 12L3.41 13.41L9 19L21 7L19.59 5.59L9 16.17Z" fill="currentColor" />
                                </svg>
                                Save
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </template>
    </div>
</template>
