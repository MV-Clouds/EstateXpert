<template>
    <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-01"
        class="slds-modal slds-fade-in-open slds-modal_medium">
        <div class="slds-modal__container">
            <div class="slds-modal__close close-icon-css" onclick={handleCloseModal}>
                <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z"
                        fill="#1F2937" />
                </svg>
            </div>

            <div class="slds-modal__header blue-header">
                <h1 id="modal-heading-01" class="slds-modal__title slds-hyphenate" tabindex="-1">Listings Published On {portalName} Portal</h1>
            </div>
            <div class="slds-modal__content border_css" id="modal-content-id-1">
                <div class="content_body">
                    <template if:true={isDataAvailable}>
                        <div class="table-content">
                            <table class="slds-table slds-table_fixed-layout">
                                <thead>
                                    <tr class="table_tr_cls">
                                        <th scope="col" class="slds-is-resizable slds-is-sortable slds-cell_action-mode sorting_header listing-name-col"
                                            data-id="name" onclick={sortClick} aria-sort="none">
                                            <div class="slds-text-link_rese sort-cover slds-has-flexi-truncate" role="button" tabindex="0">
                                                <span class="slds-truncate" title="Listing Name">Listing Name</span>
                                                <span class="slds-icon_container slds-icon-utility-arrowdown">
                                                    <svg data-index="name" class="listing-manager-icon"
                                                        viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                                                        <path
                                                            d="M374.6 246.6C368.4 252.9 360.2 256 352 256s-16.38-3.125-22.62-9.375L224 141.3V448c0 17.69-14.33 31.1-31.1 31.1S160 465.7 160 448V141.3L54.63 246.6c-12.5 12.5-32.75 12.5-45.25 0s-12.5-32.75 0-45.25l160-160c12.5-12.5 32.75-12.5 45.25 0l160 160C387.1 213.9 387.1 234.1 374.6 246.6z" />
                                                    </svg>
                                                </span>
                                            </div>
                                        </th>
                                        <th scope="col" class="slds-is-resizable slds-is-sortable slds-cell_action-mode sorting_header listing-ref-col"
                                            data-id="listing_reference" onclick={sortClick} aria-sort="none">
                                            <div class="slds-text-link_rese sort-cover slds-has-flexi-truncate" role="button" tabindex="0">
                                                <span class="slds-truncate" title="Listing Reference">Listing Reference</span>
                                                <span class="slds-icon_container slds-icon-utility-arrowdown">
                                                    <svg data-index="listing_reference" class="listing-manager-icon"
                                                        viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                                                        <path
                                                            d="M374.6 246.6C368.4 252.9 360.2 256 352 256s-16.38-3.125-22.62-9.375L224 141.3V448c0 17.69-14.33 31.1-31.1 31.1S160 465.7 160 448V141.3L54.63 246.6c-12.5 12.5-32.75 12.5-45.25 0s-12.5-32.75 0-45.25l160-160c12.5-12.5 32.75-12.5 45.25 0l160 160C387.1 213.9 387.1 234.1 374.6 246.6z" />
                                                    </svg>
                                                </span>
                                            </div>
                                        </th>
                                        <th scope="col" class="slds-is-resizable slds-is-sortable slds-cell_action-mode sorting_header listing-type-col"
                                            data-id="listing_type" onclick={sortClick} aria-sort="none">
                                            <div class="slds-text-link_rese sort-cover slds-has-flexi-truncate" role="button" tabindex="0">
                                                <span class="slds-truncate" title="Listing Type">Listing Type</span>
                                                <span class="slds-icon_container slds-icon-utility-arrowdown">
                                                    <svg data-index="listing_type" class="listing-manager-icon"
                                                        viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                                                        <path
                                                            d="M374.6 246.6C368.4 252.9 360.2 256 352 256s-16.38-3.125-22.62-9.375L224 141.3V448c0 17.69-14.33 31.1-31.1 31.1S160 465.7 160 448V141.3L54.63 246.6c-12.5 12.5-32.75 12.5-45.25 0s-12.5-32.75 0-45.25l160-160c12.5-12.5 32.75-12.5 45.25 0l160 160C387.1 213.9 387.1 234.1 374.6 246.6z" />
                                                    </svg>
                                                </span>
                                            </div>
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={listingsDatas} for:item="listingsData">
                                        <tr key={listingsData.listing_reference}>
                                            <td data-label="Listing Name" class="listing-name-col">
                                                <div>
                                                    <p class="clickable_css" onclick={redirectToListing} data-id={listingsData.id}>{listingsData.name}</p>
                                                </div>
                                            </td>
                                            <td data-label="Listing Reference" class="listing-ref-col">
                                                <div>{listingsData.listing_reference}</div>
                                            </td>
                                            <td data-label="Listing Type" class="listing-type-col">
                                                <div>{listingsData.listing_type}</div>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                    <template if:false={isDataAvailable}>
                        <div class="empty-state">
                            <div class="empty-state__content">
                                <div class="empty-state__icon">
                                    <img src="/resource/MVEX__emptyState" alt="" draggable="false">
                                </div>
                                <div class="empty-state__message">No Listing has been published on {portalName} portal yet.</div>
                            </div>
                        </div>
                    </template>
                </div>
                <div class="footerbtns">
                    <button class="white-btn-css" onclick={handleCloseModal}>
                        <svg width="14" height="14" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z"
                                fill="currentColor" />
                        </svg>
                        Close
                    </button>
                </div>
            </div>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
    <template if:true={isLoading}>
        <c-spinner-component></c-spinner-component>
    </template>
</template>
