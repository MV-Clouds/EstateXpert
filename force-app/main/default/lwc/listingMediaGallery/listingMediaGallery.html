<template>
    <template if:true={isdata}>
        <div class="gallery-card">
            <div class="gallery-header">
                <div class="header-left">
                    <h2 class="gallery-title">Listing Media Gallery</h2>
                    <p class="image-name">{currentImageName}</p>
                </div>
                <div class="header-actions">
                    <button onclick={reloadComponent} class="action-btn" title="Reload">
                        <svg height="18" width="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 21C16.9706 21 21 16.9706 21 12C21 9.69494 20.1334 7.59227 18.7083 6L16 3M12 3C7.02944 3 3 7.02944 3 12C3 14.3051 3.86656 16.4077 5.29168 18L8 21M21 3H16M16 3V8M3 21H8M8 21V16" stroke="#0176D3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <button onclick={openImagePreview} class="action-btn" title="Open in new tab">
                        <svg height="18" width="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21 9L21 3M21 3H15M21 3L13 11M10 5H7.8C6.11984 5 5.27976 5 4.63803 5.32698C4.07354 5.6146 3.6146 6.07354 3.32698 6.63803C3 7.27976 3 8.11984 3 9.8V16.2C3 17.8802 3 18.7202 3.32698 19.362C3.6146 19.9265 4.07354 20.3854 4.63803 20.673C5.27976 21 6.11984 21 7.8 21H14.2C15.8802 21 16.7202 21 17.362 20.673C17.9265 20.3854 18.3854 19.9265 18.673 19.362C19 18.7202 19 17.8802 19 16.2V14" stroke="#0176D3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="image-tags">
                <template if:true={currentImageTag.length}>
                    <template for:each={currentImageTag} for:item="tag">
                        <span key={tag} class="tag">{tag}</span>
                    </template>
                </template>
                <template if:false={currentImageTag.length}>
                    <span class="no-tags-text">No tags</span>
                </template>
            </div>

            <div class="image-container">
                <div class="image-wrapper">
                    <template if:true={showSpinner}>
                        <lightning-spinner size="medium"></lightning-spinner>
                    </template>
                    <img src={currentImageUrl} alt="Current Image" draggable="false" />
                </div>
                
                <button class="nav-arrow nav-arrow-left" onclick={showPreviousImage} title="Previous">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 18L9 12L15 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                
                <button class="nav-arrow nav-arrow-right" onclick={showNextImage} title="Next">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 18L15 12L9 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>

                <div class="image-counter">{imageCounter}</div>
                
                <div class="preview-control" onclick={openImageModel} title="Preview Image">
                    <div class="preview-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 5C7 5 2.73 8.11 1 12.5C2.73 16.89 7 20 12 20C17 20 21.27 16.89 23 12.5C21.27 8.11 17 5 12 5ZM12 17.5C9.24 17.5 7 15.26 7 12.5C7 9.74 9.24 7.5 12 7.5C14.76 7.5 17 9.74 17 12.5C17 15.26 14.76 17.5 12 17.5ZM12 9.5C10.34 9.5 9 10.84 9 12.5C9 14.16 10.34 15.5 12 15.5C13.66 15.5 15 14.16 15 12.5C15 10.84 13.66 9.5 12 9.5Z" fill="white"/>
                        </svg>
                    </div>
                    <span class="preview-text">Preview</span>
                </div>
                
                <div class="auto-play-control">
                    <button class="play-pause-btn" onclick={toggleAutoPlay} title="Toggle Auto-play">
                        <template if:true={isAutoPlaying}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect x="6" y="4" width="4" height="16" fill="white"/>
                                <rect x="14" y="4" width="4" height="16" fill="white"/>
                            </svg>
                        </template>
                        <template if:false={isAutoPlaying}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M8 5V19L19 12L8 5Z" fill="white"/>
                            </svg>
                        </template>
                    </button>
                    <template if:true={isAutoPlaying}>
                        <span class="auto-play-text">Auto</span>
                    </template>
                    <template if:false={isAutoPlaying}>
                        <span class="auto-play-text">Paused</span>
                    </template>
                </div>
            </div>
        </div>
    </template>
    <template if:false={isdata}>
        <div class="gallery-card">
            <div class="gallery-header">
                <div class="header-left">
                    <h2 class="gallery-title">Listing Media Gallery</h2>
                </div>
                <div class="header-actions">
                    <button onclick={reloadComponent} class="action-btn" title="Reload">
                        <svg height="18" width="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 21C16.9706 21 21 16.9706 21 12C21 9.69494 20.1334 7.59227 18.7083 6L16 3M12 3C7.02944 3 3 7.02944 3 12C3 14.3051 3.86656 16.4077 5.29168 18L8 21M21 3H16M16 3V8M3 21H8M8 21V16" stroke="#0176D3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="empty-state-container">
                <div class="empty-state">
                    <img src="/resource/MVEX__emptyState" alt="No images" class="empty-state-img" draggable="false" />
                    <div class="empty-state-message">No Image Found.</div>
                </div>
            </div>
        </div>
    </template>

    <template if:true={isModalOpen}>
        <div class="fullscreen-modal-backdrop" onclick={closeModal}>
            <button class="fullscreen-close-btn" onclick={closeModal} aria-label="Close">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6L18 18" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="fullscreen-modal-content">
                <template if:true={imageLoading}>
                    <div class="fullscreen-loading">
                        <div class="loading-spinner">
                            <svg width="60" height="60" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="25" cy="25" r="20" stroke="#ffffff" stroke-width="4" fill="none" stroke-dasharray="31.415, 31.415" stroke-linecap="round">
                                    <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite"/>
                                </circle>
                            </svg>
                        </div>
                        <p class="fullscreen-loading-text">Loading image...</p>
                    </div>
                </template>
                <img src={modalImageUrl} alt="Image Preview" class="fullscreen-image" draggable="false" onload={handleImageLoad} />
            </div>
        </div>
    </template>
</template>
