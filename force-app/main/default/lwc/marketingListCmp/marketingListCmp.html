                                                                    <input data-id={index} type="checkbox"

                                                                        value={contact.isChecked}

                                                            </td>
                                                            <td class="slds-cell_action-mode conat_cls" scope="row">

                                                                </div>
                                                            </td>

                            </div>
                        </div>

                </template>

                </div>

                <div class="slds-modal__header blue-header">
                    <h1 class="slds-modal__title slds-hyphenate" tabindex="-1">New Contact</h1>
                </div>
                <!-- Modal/Popup Body -->
                <div class="slds-modal__content slds-p-around_medium custom-modal-content">
                    <slot>
                        <lightning-card title="Contact Details" icon-name="standard:contact">
                            <template if:true={mobileView}>
                                <lightning-record-form record-id={recordId} object-api-name="Contact" layout-type="Full"
                                    mode="edit" columns="1" onsubmit={newContactHandle} oncancel={cancelRecordForm}>
                                </lightning-record-form>
                            </template>
                            <template if:false={mobileView}>
                                <lightning-record-form record-id={recordId} object-api-name="Contact" layout-type="Full"
                                    mode="edit" columns="2" onsubmit={newContactHandle} oncancel={cancelRecordForm}>
                                </lightning-record-form>
                            </template>
                        </lightning-card>
                    </slot>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- <c-email-campaign-modal if:true={isModalOpen} onclose={handleModalClose} selected-contacts={selectedContactList}>
    </c-email-campaign-modal> -->

    <c-send-emails if:true={isModalOpen} onclose={handleModalClose} show-modal={isModalOpen}
        object-api-name={objectName} selected-contacts={selectedContactList}>
    </c-send-emails>

    <template if:true={showTemplate}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-01"
            class="slds-modal slds-fade-in-open slds-modal_small">
            <div class="slds-modal__container">
                <div class="slds-modal__close close-icon-css" onclick={handleCloseTemplate}>
                    <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z"
                            fill="white" />
                    </svg>
                </div>

                <div class="slds-modal__header blue-header">
                    <h1 class="slds-modal__title slds-hyphenate" tabindex="-1">Send Message</h1>
                </div>

                <div class="slds-modal__content modal-body">
                    <div class="custom-modal-body" id="modal-content-id-1">
                        <div class="template-selector-section">
                            <div class="template-selector-wrapper">
                                <lightning-combobox name="template" label="Select Template" options={templateOptions}
                                    onchange={handleInputChange} value={selectedTemplate} required
                                    message-when-value-missing="Template is required" class="template-combobox">
                                </lightning-combobox>
                            </div>

                            <div class="template-prev">
                                <div class="preview-box-container">
                                    <template if:true={selectedTemplate}>
                                        <div class="preview-box">
                                            <c-template-preview template-id={selectedTemplate}
                                                record-id={previewRecordId} object-api-name={selectedObject}>
                                            </c-template-preview>
                                        </div>
                                    </template>
                                    <template if:false={selectedTemplate}>
                                        <div class="preview-placeholder">
                                            Please select a template to preview.
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <div class="preview-section-right">
                            <lightning-input type="search" label="Search contacts" variant="label-hidden"
                                placeholder="Search by name or phone" onchange={handleSearch} data-id="search-input"
                                class="contact-search">
                            </lightning-input>

                            <div class="selected-contacts-section">
                                <!-- <p class="contacts-table-label">Selected Contacts</p> -->
                                <div class="table-content popup-table">
                                    <table aria-multiselectable="true" class="slds-table slds-table_fixed-layout slds-table_resizable-cols" role="grid">
                                        <thead>
                                            <tr class="slds-line-height_reset fields-names table_tr_cls">
                                                <th aria-sort="none" data-id="Name" onclick={sortSelectedContact} class="slds-is-resizable slds-is-sortable slds-cell_action-mode sorting_header colume2" scope="col">
                                                    <div class="slds-text-link_reset sort-cover" role="button" tabindex="0">
                                                        <span class="slds-assistive-text">Sort by: </span>
                                                        <div class="slds-has-flexi-truncate center-trancate-head">
                                                            <span class="slds-truncate" title="Name">Name</span>
                                                            <span class="slds-icon_container slds-icon-utility-arrowdown">
                                                                <svg data-index="Name" class="selected-contacts-icon listing-manager-icon" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                                                                    <path d="M374.6 246.6C368.4 252.9 360.2 256 352 256s-16.38-3.125-22.62-9.375L224 141.3V448c0 17.69-14.33 31.1-31.1 31.1S160 465.7 160 448V141.3L54.63 246.6c-12.5 12.5-32.75 12.5-45.25 0s-12.5-32.75 0-45.25l160-160c12.5-12.5 32.75-12.5 45.25 0l160 160C387.1 213.9 387.1 234.1 374.6 246.6z" />
                                                                </svg>
                                                            </span>
                                                        </div>
                                                    </div>
                                                </th>
                                                <th aria-sort="none" data-id="Phone" onclick={sortSelectedContact} class="slds-is-resizable slds-is-sortable slds-cell_action-mode sorting_header colume2" scope="col">
                                                    <div class="slds-text-link_reset sort-cover" role="button" tabindex="0">
                                                        <span class="slds-assistive-text">Sort by: </span>
                                                        <div class="slds-has-flexi-truncate center-trancate-head">
                                                            <span class="slds-truncate" title="Phone">Phone</span>
                                                            <span class="slds-icon_container slds-icon-utility-arrowdown">
                                                                <svg data-index="Phone" class="selected-contacts-icon listing-manager-icon" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                                                                    <path d="M374.6 246.6C368.4 252.9 360.2 256 352 256s-16.38-3.125-22.62-9.375L224 141.3V448c0 17.69-14.33 31.1-31.1 31.1S160 465.7 160 448V141.3L54.63 246.6c-12.5 12.5-32.75 12.5-45.25 0s-12.5-32.75 0-45.25l160-160c12.5-12.5 32.75-12.5 45.25 0l160 160C387.1 213.9 387.1 234.1 374.6 246.6z" />
                                                                </svg>
                                                            </span>
                                                        </div>
                                                    </div>
                                                </th>
                                                <th class="slds-is-resizable slds-cell_action-mode colume2" scope="col">
                                                    <div class="slds-has-flexi-truncate center-trancate-head">
                                                        <span class="slds-truncate" title="Action">Action</span>
                                                    </div>
                                                </th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template if:true={filteredSelectedContacts.length}>
                                                <template for:each={filteredSelectedContacts} for:item="contact" for:index="index">
                                                    <tr key={contact.Id} class="table-tr">
                                                        <td class="slds-cell_action-mode conat_cls" scope="row">
                                                            <div class="slds-truncate">
                                                                {contact.Name}
                                                            </div>
                                                        </td>
                                                        <td class="slds-cell_action-mode conat_cls" scope="row">
                                                            <div class="slds-truncate">
                                                                {contact.Phone}
                                                            </div>
                                                        </td>
                                                        <td class="slds-cell_action-mode conat_cls" scope="row">
                                                            <div class="slds-truncate center-trancate-text">
                                                                <button class="delete-icon-css" onclick={handleRemoveContact} data-id={contact.Id} data-index={index} title="Remove">
                                                                    <svg width="15" height="15" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                                        <path d="M2.62502 3.45834L3.32598 11.5194C3.40087 12.3807 4.12187 13.0417 4.98638 13.0417H9.01369C9.87819 13.0417 10.5992 12.3807 10.674 11.5194L11.375 3.45834M5.12502 3.25V2.625C5.12502 1.70453 5.87119 0.958336 6.79169 0.958336H7.20835C8.12885 0.958336 8.87502 1.70453 8.87502 2.625V3.25M1.16669 3.45834H12.8334" stroke="#212529" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" />
                                                                    </svg>
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </template>
                                            <template if:false={filteredSelectedContacts.length}>
                                                <tr>
                                                    <td colspan="3" class="no-results-cell">
                                                        <div class="no-results-container">
                                                            <lightning-icon icon-name="utility:search" size="small"></lightning-icon>
                                                            <span>No matching contacts found</span>
                                                        </div>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="popUpFooter slds-text-align--center">
                        <button class="blue-btn-css" onclick={handleConfirmPopup}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path d="M9 16.17L4.83 12L3.41 13.41L9 19L21 7L19.59 5.59L9 16.17Z"
                                    fill="currentColor" />
                            </svg>
                            Send
                        </button>
                        <button class="white-btn-css" onclick={handleSchedulePopup}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M19 4H18V2H16V4H8V2H6V4H5C3.89 4 3.01 4.9 3.01 6L3 20C3 21.1 3.89 22 5 22H19C20.1 22 21 21.1 21 20V6C21 4.9 20.1 4 19 4ZM19 20H5V10H19V20ZM19 8H5V6H19V8ZM12 13H17V18H12V13Z"
                                    fill="currentColor" />
                            </svg>
                            Schedule
                        </button>
                    </div>
                </div>
            </div>
        </section>
        <!-- Backdrop for main modal -->
        <div class="slds-backdrop slds-backdrop_open main-modal-backdrop"></div>

        <!-- Schedule Modal -->
        <template if:true={popUpLastPage}>
            <div class="slds-backdrop slds-backdrop_open schedule-modal-backdrop" onclick={handleBackdropClick}></div>

            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="datetime-modal-heading"
                class="slds-modal slds-fade-in-open schedule-modal" aria-describedby="modal-content-id-2">
                <div class="slds-modal__container schedule-modal-container">
                    <div class="slds-modal__close close-icon-css" onclick={handlePreviousLastPage}>
                        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z"
                                fill="white" />
                        </svg>
                    </div>

                    <div class="slds-modal__header blue-header">
                        <h2 class="slds-modal__title" id="datetime-modal-heading">Schedule Date & Time</h2>
                    </div>

                    <div class="slds-modal__content schedule-modal-content" id="modal-content-id-2">
                        <div class="datetime-selection-wrapper">

                            <div class="timezone-note">
                                <svg class="w-6 h-6 text-gray-800 dark:text-white cal-icon" aria-hidden="true"
                                    xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none"
                                    viewBox="0 0 24 24">
                                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                        stroke-width="2"
                                        d="M4 10h16M8 14h8m-4-7V4M7 7V4m10 3V4M5 20h14a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1H5a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1Z" />
                                </svg>
                                <div class="schedule-message">
                                    <p class="main-line">Schedule your message</p>
                                    <p class="next-line">Choose when to send the template.</p>
                                </div>
                            </div>
                            <lightning-input type="datetime-local" name="scheduleDateTime" label="Select Date and Time"
                                value={selectedDateTime} onchange={handleInputChange} required
                                message-when-value-missing="Please select a date and time" variant="label-stacked">
                            </lightning-input>

                        </div>

                        <div class="schedule-modal-footer slds-text-align--center">
                            <button class="white-btn-css" onclick={handlePreviousLastPage}>
                                <svg width="14" height="14" viewBox="0 0 20 20" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z"
                                        fill="currentColor" />
                                </svg>
                                Cancel
                            </button>
                            <button class="blue-btn-css" onclick={handleSchedule}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path d="M9 16.17L4.83 12L3.41 13.41L9 19L21 7L19.59 5.59L9 16.17Z"
                                        fill="currentColor" />
                                </svg>
                                Confirm &amp; Send
                            </button>
                        </div>
                    </div>

                </div>
            </section>
        </template>

        <div class="slds-backdrop slds-backdrop_open main-modal-backdrop"></div>

        <template if:true={popUpConfirmPage}>
            <div class="slds-backdrop slds-backdrop_open schedule-modal-backdrop" onclick={handleBackdropClick}></div>

            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="confirm-modal-heading"
                class="slds-modal slds-fade-in-open confirm-modal" aria-describedby="modal-content-id-3">
                <div class="slds-modal__container schedule-modal-container">
                    <div class="slds-modal__close close-icon-css" onclick={handlePreviousLastPage}>
                        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z"
                                fill="white" />
                        </svg>
                    </div>

                    <div class="slds-modal__header blue-header">
                        <h2 class="slds-modal__title" id="confirm-modal-heading">Are you sure?</h2>
                    </div>

                    <div class="slds-modal__content schedule-modal-content" id="modal-content-id-3">
                        <p>Are you sure you want to send this template to the selected contacts?</p>


                        <div class="schedule-modal-footer slds-text-align--center">
                            <button class="white-btn-css" onclick={handlePreviousLastPage}>
                                <svg width="14" height="14" viewBox="0 0 20 20" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z"
                                        fill="currentColor" />
                                </svg>
                                Cancel
                            </button>
                            <button class="blue-btn-css" onclick={handleSendOnPopup}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path d="M9 16.17L4.83 12L3.41 13.41L9 19L21 7L19.59 5.59L9 16.17Z"
                                        fill="currentColor" />
                                </svg>
                                Confirm &amp; Send
                            </button>
                        </div>
                    </div>

                </div>
            </section>
        </template>
    </template>
</template>
