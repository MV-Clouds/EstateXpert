<template>
    <template if:true={isLoading}>
        <c-spinner-component></c-spinner-component>
    </template>
    <template if:false={showLicenseError}>
        <div class="wrapper">
            <div class="main_content_cls">
                <div class="custom-accordion">

                    <!-- ── Whatsapp Chat Window Configuration ───────────────────── -->
                    <section class={chatSectionClass}>
                        <button type="button" class="accordion-header-btn" data-section="chatWindowConfig"
                            aria-expanded={isChatSectionOpen} onclick={handleToggleSection}>
                            <span class="accordion-title-group">
                                <span class="section-icon" aria-hidden="true">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path
                                            d="M4 7.5C4 6.11929 5.11929 5 6.5 5H17.5C18.8807 5 20 6.11929 20 7.5V16.5C20 17.8807 18.8807 19 17.5 19H6.5C5.11929 19 4 17.8807 4 16.5V7.5Z"
                                            stroke="#0176D3" stroke-width="1.6"></path>
                                        <path d="M8 11H16M8 14.5H13" stroke="#0176D3" stroke-width="1.6"
                                            stroke-linecap="round"></path>
                                    </svg>
                                </span>
                                <span class="accordion-title">Whatsapp Chat Window Configuration</span>
                            </span>
                            <span class="accordion-icon-wrap">
                                <svg class="accordion-icon" width="18" height="18" viewBox="0 0 20 20" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path d="M5 7.5L10 12.5L15 7.5" stroke="#1F2937" stroke-width="2"
                                        stroke-linecap="round" stroke-linejoin="round"></path>
                                </svg>
                            </span>
                        </button>

                        <template if:true={isChatSectionOpen}>
                            <div class="accordion-panel">

                                <!-- VIEW MODE -->
                                <template if:false={isChatWindowConfigEdit}>
                                    <div class="user-header">
                                        <div class="selectedObject">Object: Contact</div>
                                        <button class="save_btn_css btn-with-icon" onclick={handleEditChatConfig}>
                                            <span class="btn-icon" aria-hidden="true">
                                                <svg width="12" height="12" viewBox="0 0 14 14" fill="none"
                                                    xmlns="http://www.w3.org/2000/svg">
                                                    <path
                                                        d="M13.0416 13.0417H8.45831M0.958313 13.0417L4.49998 12.2083L12.2441 4.46426C12.5695 4.13882 12.5695 3.61119 12.2441 3.28575L10.7142 1.75593C10.3888 1.43049 9.86115 1.43049 9.53573 1.75593L1.79165 9.50001L0.958313 13.0417Z"
                                                        stroke="currentColor" stroke-width="1.7" stroke-linecap="round"
                                                        stroke-linejoin="round" />
                                                </svg>
                                            </span>
                                            <span>Edit</span>
                                        </button>
                                    </div>
                                    <div class="table-content">
                                        <table class="slds-table">
                                            <thead>
                                                <tr>
                                                    <th scope="col" style="width:50%">
                                                        <div class="slds-truncate">Object</div>
                                                    </th>
                                                    <th scope="col" style="width:50%">
                                                        <div class="slds-truncate">Phone Field</div>
                                                    </th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template if:true={chatWindowRows.length}>
                                                    <template for:each={chatWindowRows} for:item="row">
                                                        <tr key={row.id}>
                                                            <td>
                                                                <div class="slds-truncate">{row.selectedObject}</div>
                                                            </td>
                                                            <td>
                                                                <div class="slds-truncate">{row.selectedPhoneField}
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    </template>
                                                </template>
                                                <template if:false={chatWindowRows.length}>
                                                    <tr>
                                                        <td class="slds-text-align_center" colspan="2">
                                                            Not configured yet. Click Edit Configuration to set up.
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </template>

                                <!-- EDIT MODE -->
                                <template if:true={isChatWindowConfigEdit}>
                                    <div class="config-header">
                                        <div class="config-note">Configure the phone field used for WhatsApp chat on the
                                            Contact object.</div>
                                        <div class="save-btn">
                                            <button class="cancel_btn_css btn-with-icon" onclick={handleCancel}>
                                                <span class="btn-icon" aria-hidden="true">
                                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                                        xmlns="http://www.w3.org/2000/svg">
                                                        <path d="M6 6L18 18M18 6L6 18" stroke="currentColor"
                                                            stroke-width="1.8" stroke-linecap="round"></path>
                                                    </svg>
                                                </span>
                                                <span>Cancel</span>
                                            </button>
                                            <button class="save_btn_css btn-with-icon"
                                                onclick={handleSaveChatWindowConfig} disabled={isChatSaveDisabled}>
                                                <span class="btn-icon" aria-hidden="true">
                                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                                        xmlns="http://www.w3.org/2000/svg">
                                                        <path d="M5 12.5L10 17L19 8" stroke="currentColor"
                                                            stroke-width="1.8" stroke-linecap="round"
                                                            stroke-linejoin="round"></path>
                                                    </svg>
                                                </span>
                                                <span>Save</span>
                                            </button>
                                        </div>
                                    </div>
                                    <div class="table-content">
                                        <table class="slds-table custom-table">
                                            <thead>
                                                <tr>
                                                    <th scope="col" style="width:50%">
                                                        <div class="slds-truncate">Object</div>
                                                    </th>
                                                    <th scope="col" style="width:50%">
                                                        <div class="slds-truncate">Phone Field</div>
                                                    </th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template for:each={chatWindowRows} for:item="row">
                                                    <tr key={row.id}>
                                                        <td>
                                                            <div class="slds-truncate object-static-label">
                                                                {row.selectedObject}</div>
                                                        </td>
                                                        <td>
                                                            <lightning-combobox variant="label-hidden"
                                                                data-row-id={row.id} value={row.selectedPhoneField}
                                                                options={row.phoneFieldOptions}
                                                                onchange={handlePhoneFieldChange}
                                                                placeholder="Select Phone Field"
                                                                disabled={row.isPhoneFieldDisabled}>
                                                            </lightning-combobox>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </template>

                            </div>
                        </template>
                    </section>

                    <!-- ── Whatsapp Webhook Configuration ───────────────────────── -->
                    <section class={webhookSectionClass}>
                        <button type="button" class="accordion-header-btn" data-section="webhookConfig"
                            aria-expanded={isWebhookSectionOpen} onclick={handleToggleSection}>
                            <span class="accordion-title-group">
                                <span class="section-icon" aria-hidden="true">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path
                                            d="M6 8C6 6.34315 7.34315 5 9 5H15C16.6569 5 18 6.34315 18 8V16C18 17.6569 16.6569 19 15 19H9C7.34315 19 6 17.6569 6 16V8Z"
                                            stroke="#0176D3" stroke-width="1.6"></path>
                                        <circle cx="12" cy="15.2" r="1" fill="#0176D3"></circle>
                                    </svg>
                                </span>
                                <span class="accordion-title">Whatsapp Webhook Configuration</span>
                            </span>
                            <span class="accordion-icon-wrap">
                                <svg class="accordion-icon" width="18" height="18" viewBox="0 0 20 20" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path d="M5 7.5L10 12.5L15 7.5" stroke="#1F2937" stroke-width="2"
                                        stroke-linecap="round" stroke-linejoin="round"></path>
                                </svg>
                            </span>
                        </button>

                        <template if:true={isWebhookSectionOpen}>
                            <div class="accordion-panel">

                                <!-- VIEW MODE -->
                                <template if:false={isWebhookConfigEdit}>
                                    <div class="user-header">
                                        <div class="config-summary">
                                            <span class="selectedObject">Object: {selectedObject}</span>
                                            <template if:true={selectedPhoneFieldLabel}>
                                                <span class="phone-field-tag">
                                                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
                                                        xmlns="http://www.w3.org/2000/svg">
                                                        <path
                                                            d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.02-.24c1.12.37 2.33.57 3.57.57a1 1 0 011 1V20a1 1 0 01-1 1C5.4 21 3 9.6 3 4a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.45.57 3.57a1 1 0 01-.24 1.02l-2.21 2.2z"
                                                            stroke="currentColor" stroke-width="2"
                                                            stroke-linecap="round" stroke-linejoin="round" />
                                                    </svg>
                                                    {selectedPhoneFieldLabel} ({selectedPhoneFieldVal})
                                                </span>
                                            </template>
                                        </div>
                                        <button class="save_btn_css btn-with-icon" onclick={handleEdit}>
                                            <span class="btn-icon" aria-hidden="true">
                                                <svg width="12" height="12" viewBox="0 0 14 14" fill="none"
                                                    xmlns="http://www.w3.org/2000/svg">
                                                    <path
                                                        d="M13.0416 13.0417H8.45831M0.958313 13.0417L4.49998 12.2083L12.2441 4.46426C12.5695 4.13882 12.5695 3.61119 12.2441 3.28575L10.7142 1.75593C10.3888 1.43049 9.86115 1.43049 9.53573 1.75593L1.79165 9.50001L0.958313 13.0417Z"
                                                        stroke="currentColor" stroke-width="1.7" stroke-linecap="round"
                                                        stroke-linejoin="round" />
                                                </svg>
                                            </span>
                                            <span>Edit</span>
                                        </button>
                                    </div>
                                    <div class="table-content">
                                        <table class="slds-table">
                                            <thead>
                                                <tr>
                                                    <th scope="col" style="width:33%">
                                                        <div class="slds-truncate">Field API Name</div>
                                                    </th>
                                                    <th scope="col" style="width:33%">
                                                        <div class="slds-truncate">Field Type</div>
                                                    </th>
                                                    <th scope="col" style="width:33%">
                                                        <div class="slds-truncate">Default Value</div>
                                                    </th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template if:true={requiredFields.length}>
                                                    <template for:each={requiredFields} for:item="field">
                                                        <tr key={field.apiName}>
                                                            <td>
                                                                <div class="slds-truncate">{field.apiName}</div>
                                                            </td>
                                                            <td>
                                                                <div class="slds-truncate">{field.type}</div>
                                                            </td>
                                                            <td>
                                                                <div class="slds-truncate">
                                                                    <template
                                                                        if:true={field.isReference}>{field.relatedRecordName}</template>
                                                                    <template
                                                                        if:false={field.isReference}>{field.value}</template>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    </template>
                                                </template>
                                                <template if:false={requiredFields.length}>
                                                    <tr>
                                                        <td class="slds-text-align_center" colspan="3">No required
                                                            fields for the selected object</td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </template>

                                <!-- EDIT MODE -->
                                <template if:true={isWebhookConfigEdit}>
                                    <div class="config-header">
                                        <div class="config-note">Configure the default field values and phone field for
                                            incoming WhatsApp messages on the Contact object.</div>
                                        <div class="btn-container">
                                            <div class="save-btn">
                                                <button class="cancel_btn_css btn-with-icon" onclick={handleCancel}>
                                                    <span class="btn-icon" aria-hidden="true">
                                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                                            xmlns="http://www.w3.org/2000/svg">
                                                            <path d="M6 6L18 18M18 6L6 18" stroke="currentColor"
                                                                stroke-width="1.8" stroke-linecap="round"></path>
                                                        </svg>
                                                    </span>
                                                    <span>Cancel</span>
                                                </button>
                                                <button class="save_btn_css btn-with-icon" onclick={handleSave}
                                                    disabled={isWebhookSaveDisabled}>
                                                    <span class="btn-icon" aria-hidden="true">
                                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                                            xmlns="http://www.w3.org/2000/svg">
                                                            <path d="M5 12.5L10 17L19 8" stroke="currentColor"
                                                                stroke-width="1.8" stroke-linecap="round"
                                                                stroke-linejoin="round"></path>
                                                        </svg>
                                                    </span>
                                                    <span>Save</span>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="table-content">
                                        <table class="slds-table">
                                            <thead>
                                                <tr>
                                                    <th scope="col" style="width:33%">
                                                        <div class="slds-truncate">Field API Name</div>
                                                    </th>
                                                    <th scope="col" style="width:33%">
                                                        <div class="slds-truncate">Field Type</div>
                                                    </th>
                                                    <th scope="col" style="width:33%">
                                                        <div class="slds-truncate">Default Value</div>
                                                    </th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template if:true={requiredFields.length}>
                                                    <template for:each={requiredFields} for:item="field">
                                                        <tr key={field.apiName}>
                                                            <td>
                                                                <div class="slds-truncate">{field.apiName}</div>
                                                            </td>
                                                            <td>
                                                                <div class="slds-truncate">{field.type}</div>
                                                            </td>
                                                            <td>
                                                                <template if:true={field.isString}>
                                                                    <lightning-input variant="label-hidden" type="text"
                                                                        data-field={field.apiName} value={field.value}
                                                                        onchange={handleInputChange}></lightning-input>
                                                                </template>
                                                                <template if:true={field.isNumber}>
                                                                    <lightning-input variant="label-hidden"
                                                                        type="number" data-field={field.apiName}
                                                                        value={field.value}
                                                                        onchange={handleInputChange}></lightning-input>
                                                                </template>
                                                                <template if:true={field.isDate}>
                                                                    <lightning-input variant="label-hidden" type="date"
                                                                        data-field={field.apiName} value={field.value}
                                                                        onchange={handleInputChange}></lightning-input>
                                                                </template>
                                                                <template if:true={field.isDateTime}>
                                                                    <lightning-input variant="label-hidden"
                                                                        type="datetime" data-field={field.apiName}
                                                                        value={field.value}
                                                                        onchange={handleInputChange}></lightning-input>
                                                                </template>
                                                                <template if:true={field.isReference}>
                                                                    <lightning-record-picker label="Search records"
                                                                        variant="label-hidden"
                                                                        placeholder="Search records here..."
                                                                        object-api-name={field.relatedObject}
                                                                        value={field.value} data-field={field.apiName}
                                                                        onchange={handleRecordSelection}></lightning-record-picker>
                                                                </template>
                                                                <template if:true={field.isTextArea}>
                                                                    <lightning-textarea variant="label-hidden"
                                                                        data-field={field.apiName} value={field.value}
                                                                        onchange={handleInputChange}></lightning-textarea>
                                                                </template>
                                                                <template if:true={field.isPicklist}>
                                                                    <lightning-combobox variant="label-hidden"
                                                                        data-field={field.apiName} value={field.value}
                                                                        options={field.picklistValues}
                                                                        onchange={handleInputChange}></lightning-combobox>
                                                                </template>
                                                                <template if:true={field.isBoolean}>
                                                                    <lightning-input variant="label-hidden"
                                                                        type="checkbox" checked={field.value}
                                                                        data-field={field.apiName}
                                                                        onchange={handleCheckboxChange}></lightning-input>
                                                                </template>
                                                            </td>
                                                        </tr>
                                                    </template>
                                                </template>
                                                <template if:false={requiredFields.length}>
                                                    <tr>
                                                        <td class="slds-text-align_center" colspan="3">No required
                                                            fields for the selected object</td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                    <div class="table-content">
                                        <table class="slds-table">
                                            <thead>
                                                <tr>
                                                    <th scope="col" style="width:50%">
                                                        <div class="slds-truncate">Phone Field for Incoming WhatsApp
                                                            Messages</div>
                                                    </th>
                                                    <th scope="col" style="width:50%"></th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr>
                                                    <td><span>Phone Field</span></td>
                                                    <td>
                                                        <template if:true={webhookPhoneFieldOptions.length}>
                                                            <lightning-combobox variant="label-hidden"
                                                                value={selectedPhoneFieldVal}
                                                                options={webhookPhoneFieldOptions}
                                                                onchange={handleWebhookPhoneComboChange}
                                                                placeholder="Select Phone Field">
                                                            </lightning-combobox>
                                                        </template>
                                                        <template if:false={webhookPhoneFieldOptions.length}>
                                                            <p>No phone fields available for the selected object.</p>
                                                        </template>
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>

                                </template>

                            </div>
                        </template>
                    </section>

                </div>
            </div>
        </div>
    </template>
</template>
