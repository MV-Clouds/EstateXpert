<template>
    <div class="main_div_portal_mapping_landing_container">
        <div class="field-mapping-container">
            <div class="action">
                <button class="blue-btn-css" onclick={handleSave} disabled={isButtonsDisabled}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 16.17L4.83 12L3.41 13.41L9 19L21 7L19.59 5.59L9 16.17Z" fill="currentColor" />
                    </svg>
                    Save
                </button>
                <button class="blue-btn-css" onclick={revertTheChanges} disabled={isButtonsDisabled}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 5V2L7 7L12 12V9C15.31 9 18 11.69 18 15C18 18.31 15.31 21 12 21C8.69 21 6 18.31 6 15H4C4 19.42 7.58 23 12 23C16.42 23 20 19.42 20 15C20 10.58 16.42 7 12 5Z"
                            fill="currentColor" />
                    </svg>
                    Revert Changes
                </button>
                <button class="white-btn-css" onclick={viewListOfPortals}>
                    <svg width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52"
                        enable-background="new 0 0 52 52" xml:space="preserve">
                        <path
                            d="M51.8,25.1C47.1,15.6,37.3,9,26,9S4.9,15.6,0.2,25.1c-0.3,0.6-0.3,1.3,0,1.8C4.9,36.4,14.7,43,26,43 s21.1-6.6,25.8-16.1C52.1,26.3,52.1,25.7,51.8,25.1z M26,37c-6.1,0-11-4.9-11-11s4.9-11,11-11s11,4.9,11,11S32.1,37,26,37z"
                            fill="currentColor"></path>
                        <path d="M26,19c-3.9,0-7,3.1-7,7s3.1,7,7,7s7-3.1,7-7S29.9,19,26,19z" fill="currentColor"></path>
                    </svg>
                    View Listings
                </button>
            </div>

            <template if:true={isRecordAvailable}>
                <div class="main_content_cls">
                    <div class="table-content">
                        <table class="slds-table slds-table_fixed-layout">
                            <thead>
                                <tr class="table_tr_cls">
                                    <th scope="col" class="column1">
                                        <div class="min_width_css header-text">Listing Fields</div>
                                    </th>
                                    <th scope="col" class="column1">
                                        <div class="min_width_css header-text">Portals Fields</div>
                                    </th>
                                    <th scope="col" class="column1">
                                        <div class="min_width_css header-text">Example</div>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={finalList} for:item="val" for:index="index">
                                    <tr key={val.id}>
                                        <td data-label="Listing Fields">
                                            <div class="slds-col position_css">
                                                <div if:true={val.isRequired} class="red_css">*</div>
                                                <lightning-combobox
                                                    label=""
                                                    options={val.listingFields}
                                                    data-index={index}
                                                    data-datatype={val.dataType}
                                                    variant="label-hidden"
                                                    value={val.listingFieldAPIName}
                                                    onchange={handleComboboxChange}>
                                                </lightning-combobox>
                                            </div>
                                        </td>
                                        <td data-label="Portals Fields">
                                            <div class="slds-col view_input slds-input_faux font_styles1 portal_label_truncate_css">
                                                {val.portalLabel}
                                                <template if:true={val.description}>
                                                    <lightning-helptext content={val.description}></lightning-helptext>
                                                </template>
                                            </div>
                                        </td>
                                        <td data-label="Example">
                                            <div class="slds-col font_styles2">
                                                {val.example}
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>

            <template if:false={isRecordAvailable}>
                <div class="empty-state">
                    <div class="empty-state__content">
                        <div class="empty-state__icon">
                            <img src="/resource/MVEX__emptyState" alt="" draggable="false">
                        </div>
                        <div class="empty-state__message">No records has been added yet.</div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <template if:true={showModal}>
        <c-setting-pop-up onhidepopup={handleHidePopup} get-portal-name={portalGen}
            get-portal-icon-url={portalIconUrl} get-portal-id={portalId} onrefreshpageonhide={handleHideAndRefreshPage}></c-setting-pop-up>
    </template>

    <template if:true={isSpinner}>
        <c-spinner-component></c-spinner-component>
    </template>

    <template if:true={showListingPopup}>
        <c-list-of-published-listings portal-id={portalId} portal-name={portalName} onclosemodal={handleCloseListingViewPopup}></c-list-of-published-listings>
    </template>
</template>
