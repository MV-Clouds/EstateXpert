<template>
    <div class="portal-syndication">
        <h2>Portal Syndication</h2>
        <template if:true={isDataAvailable}>
            <div class="data-table-container">
                <div class="portal_syndication_table">
                    <table class="custom-data-table">
                    <thead>
                        <tr class="table_tr_cls">
                            <th scope="col" class="header-cell">
                                <div>Name</div>
                            </th>
                            <th scope="col" class="header-cell">
                                <div>Status</div>
                            </th>
                            <th scope="col" class="header-cell">
                                <div>Action</div>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={portals} for:item="portal" for:index="index">
                            <tr key={portal.id}>
                                <td data-label="Name">
                                    <div class="name_truncate_css">{portal.name}</div>
                                </td>
                                <td data-label="Status">
                                    <span class={portal.badgeColor}>
                                        {portal.status}
                                    </span>
                                </td>
                                <td data-label="Action">
                                    <template if:true={portal.isPublished}>
                                        <button class="unpublish_css" onclick={handleToggleStatus} data-id={portal.id}
                                            data-pname={portal.pname} data-button-label={portal.buttonLabel}>
                                            <svg width="14" height="14" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <path
                                                d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z"
                                                fill="white" />
                                            </svg>
                                            {portal.buttonLabel}
                                        </button>
                                    </template>
                                    <template if:false={portal.isPublished}>
                                        <button class="publish_css" onclick={handleToggleStatus} data-id={portal.id}
                                            data-pname={portal.pname} data-button-label={portal.buttonLabel}>
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z" fill="white"/>
                                            </svg>
                                            {portal.buttonLabel}
                                        </button>
                                    </template>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
                </div>
            </div>
        </template>

        <template if:false={isDataAvailable}>
            <div class="no-data-container">
                <img src="/resource/MVEX__emptyState" alt="" draggable="false">
                <div class="no-data-message">No Data Found</div>
            </div>
        </template>

        <template if:true={showSpinner}>
            <lightning-spinner variant="brand" alternative-text="Loading Portals" size="medium">
            </lightning-spinner>
        </template>
    </div>
    <template if:true={isErrorPopup}>
        <div class="popup-container my_popup_container">
            <c-error-popup-for-portals jsonbody={errorBody} portalname={portalName} type={errorType}
                onhidepopup={handleHidePopup}></c-error-popup-for-portals>
        </div>
    </template>
</template>
