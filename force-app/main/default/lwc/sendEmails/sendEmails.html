<template>
    <template if:true={showModal}>
        <div class="wrapper">
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium">
                <div class="slds-modal__container">
                    <div class="slds-modal__close closs_icon_css" onclick={closeModal}>
                        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z" fill="white" />
                        </svg>
                    </div>
    
                    <header class="slds-modal__header custom-header">
                        <h2 class="slds-text-heading_medium slds-hyphenate">
                            <template if:true={isStep1}>Select Campaign Type</template>
                            <template if:true={isStep2}>{selectedOptionLabel} - Template Selection</template>
                            <template if:true={isStep3}>Campaign Details & Recipients</template>
                        </h2>
                    </header>
                
                    <div class="slds-modal__content slds-p-around_medium custom-content">
                        <div class="wizard-progress">
                            <lightning-progress-indicator current-step={currentStepValue} type="path" variant="base">
                                <template for:each={steps} for:item="step">
                                    <lightning-progress-step label={step.label} value={step.value} key={step.value}></lightning-progress-step>
                                </template>
                            </lightning-progress-indicator>
                        </div>
    
                        <template if:true={isStep1}>
                            <div class="option-container animate-fade-in">
                                <div class="option-card" onclick={handleOptionSelect} data-value="single">
                                    <div class="option-icon">📧</div>
                                    <h3>Single Marketing Campaign</h3>
                                    <p>Send a one-time email campaign to your selected audience</p>
                                </div>
                                <div class="option-card" onclick={handleOptionSelect} data-value="drip">
                                    <div class="option-icon">🔄</div>
                                    <h3>Marketing Campaign Drip</h3>
                                    <p>Set up a series of automated emails sent over time</p>
                                </div>
                            </div>
                        </template>
    
                        <template if:true={isStep2}>
                            <div class="step-config-wrapper animate-fade-in">
                                <template if:true={isSingleCampaign}>
                                    <div class="section-card slds-m-bottom_medium">
                                    <div class="section-header">
                                        <h2 class="section-title">Configuration</h2>
                                    </div>
                                    <div class="config-grid">
                                        <div class="config-item">
                                            <lightning-combobox
                                                name="templateRelatedObject"
                                                label="Select Related Object"
                                                value={campaignDetails.templateRelatedObject}
                                                options={templateObjectOptions}
                                                onchange={handleRelatedObjectChange}
                                                dropdown-alignment="auto"
                                                required
                                                class="custom-combobox">
                                            </lightning-combobox>
                                        </div>
                                        <template if:true={showSingleListingSelector}>
                                            <div class="config-item">
                                                <label class="form-label slds-m-bottom_xx-small"><span style="color: red;">*</span> Select Listing</label>
                                                <div class="custom-combobox-container">
                                                    <div class="combobox-input-wrapper" onclick={handleListingComboboxClick}>
                                                        <input type="text" class="combobox-input" placeholder="Search listing..." value={selectedListingName} readonly />
                                                        <lightning-icon icon-name="utility:down" size="x-small" class="combobox-icon"></lightning-icon>
                                                        <template if:true={selectedListing}>
                                                            <lightning-icon icon-name="utility:close" size="x-small" class="combobox-clear-icon" onclick={handleClearSingleListing}></lightning-icon>
                                                        </template>
                                                    </div>
                                                    <template if:true={isListingDropdownOpen}>
                                                        <div class="combobox-dropdown" onclick={handleListingDropdownClick}>
                                                            <div class="combobox-search-wrapper">
                                                                <lightning-icon icon-name="utility:search" size="x-small" class="search-icon"></lightning-icon>
                                                                <input type="text" class="combobox-search-input" placeholder="Search listing..." value={listingSearchTerm} oninput={handleListingSearchInput} />
                                                            </div>
                                                            <div class="combobox-options">
                                                                <template if:true={filteredListingsOptions.length}>
                                                                    <template for:each={filteredListingsOptions} for:item="option">
                                                                        <div key={option.value} class="combobox-option" data-value={option.value} data-label={option.label} onclick={handleSingleListingSelect}>
                                                                            {option.label}
                                                                        </div>
                                                                    </template>
                                                                </template>
                                                                <template if:false={filteredListingsOptions.length}>
                                                                    <div class="combobox-no-results">No matching listings found</div>
                                                                </template>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>

                                <template if:true={isSingleCampaign}>
                                    <div class="section-card template-selection-card animate-fade-in">
                                        <div class="template-selector-header">
                                            <h3 class="section-title">Email Template</h3>
                                        </div>
                                        <div class="template-selector-body">
                                            <div class="template-input-group">
                                                <lightning-combobox
                                                    variant="label-hidden"
                                                    value={selectedTemplate}
                                                    options={availableTemplates}
                                                    onchange={handleTemplateSelect}
                                                    placeholder="Choose a template..."
                                                    dropdown-alignment="auto"
                                                    class="custom-combobox">
                                                </lightning-combobox>
                                                <button class="blue-btn-css" onclick={handlePreviewSingleTemplate} disabled={selectedTemplateDisalbed}>
                                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                        <path d="M12 5C6 5 2 12 2 12C2 12 6 19 12 19C18 19 22 12 22 12C22 12 18 5 12 5ZM12 16C9.79 16 8 14.21 8 12C8 9.79 9.79 8 12 8C14.21 8 16 9.79 16 12C16 14.21 14.21 16 12 16Z" fill="currentColor"/>
                                                    </svg>
                                                    Preview
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </template>
        
                                <template if:true={isDripCampaign}>
                                    <div class="drip-campaign-wrapper-redesigned">
                                        <div class="drip-sequence-panel">
                                            <div class="drip-sequence-header">
                                                <h3>Drip Sequence</h3>
                                                <button class="add-email-btn" onclick={handleAddNewEmail}>
                                                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                                        <path d="M10 4V16M4 10H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                                    </svg>
                                                </button>
                                            </div>
                                            <div class="start-date-section">
                                                <lightning-input type="date" name="dripStartDate" label="Campaign Start Date" value={dripStartDate} min={minDripStartDate} onchange={handleDripStartDateChange} required class="start-date-input"></lightning-input>
                                            </div>
                                            <div class="drip-sequence-list">
                                                <template for:each={dripSequence} for:item="email">
                                                    <div key={email.id} class={email.selectedClass} data-id={email.id} onclick={handleSelectDrip}>
                                                        <div class="drip-sequence-number">{email.displayIndex}</div>
                                                        <div class="drip-sequence-content">
                                                            <div class="drip-sequence-title">{email.name}</div>
                                                            <div class={computeTimingClass}>
                                                                <template if:true={email.daysAfterStartDate}>After {email.daysAfterStartDate} days at {email.formattedTime}</template>
                                                                <template if:false={email.daysAfterStartDate}>Immediate at {email.formattedTime}</template>
                                                            </div>
                                                            <div class={email.templateClass}>{email.templateLabel}</div>
                                                        </div>
                                                        <template if:true={email.canDelete}>
                                                            <button class="delete-email-btn" data-id={email.id} onclick={handleDeleteEmail}>
                                                                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                                    <path d="M2.62502 3.45834L3.32598 11.5194C3.40087 12.3807 4.12187 13.0417 4.98638 13.0417H9.01369C9.87819 13.0417 10.5992 12.3807 10.674 11.5194L11.375 3.45834M5.12502 3.25V2.625C5.12502 1.70453 5.87119 0.958336 6.79169 0.958336H7.20835C8.12885 0.958336 8.87502 1.70453 8.87502 2.625V3.25M1.16669 3.45834H12.8334" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
                                                                </svg>
                                                            </button>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
        
                                        <div class="configure-email-panel">
                                            <template if:true={selectedDrip}>
                                                <div class="configure-email-form">
                                                    <h3>Configure {selectedDrip.name}</h3>
                                                    <div class="delay-section">
                                                        <div class="delay-field">
                                                            <label class="form-label"><span style="color: red;">*</span> Days After Start Date</label>
                                                            <lightning-input type="number" value={selectedDrip.daysAfterStartDate} min="0" step="1" data-id={selectedDrip.id} onchange={handleDaysAfterStartDateChange} class={computeDelayInputClass} variant="label-hidden"></lightning-input>
                                                        </div>
                                                        <div class="delay-field">
                                                            <label class="form-label"><span style="color: red;">*</span> Time to Send</label>
                                                            <lightning-input type="time" value={selectedDrip.timeToSend} data-id={selectedDrip.id} onchange={handleTimeToSendChange} class={computeTimeInputClass} variant="label-hidden"></lightning-input>
                                                        </div>
                                                    </div>

                                                    <div class="form-field slds-m-bottom_medium">
                                                        <label class="form-label"><span style="color: red;">*</span> Select Related Object</label>
                                                        <lightning-combobox
                                                            name="dripRelatedObject"
                                                            variant="label-hidden"
                                                            value={selectedDrip.relatedObject}
                                                            options={templateObjectOptions}
                                                            data-id={selectedDrip.id}
                                                            onchange={handleDripRelatedObjectChange}
                                                            placeholder="Choose object..."
                                                            dropdown-alignment="auto"
                                                            class="custom-combobox">
                                                        </lightning-combobox>
                                                    </div>
                                                    
                                                    <template if:true={showDripListingSelector}>
                                                        <div class="form-field listing-field slds-m-bottom_medium">
                                                            <label class="form-label"><span style="color: red;">*</span> Select Listing</label>
                                                            <div class="custom-combobox-container">
                                                                <div class="combobox-input-wrapper" onclick={handleListingComboboxClick}>
                                                                    <input type="text" class="combobox-input" placeholder="Search listing..." value={selectedDrip.selectedListingName} readonly />
                                                                    <lightning-icon icon-name="utility:down" size="x-small" class="combobox-icon"></lightning-icon>
                                                                    <template if:true={selectedDrip.selectedListingId}>
                                                                        <lightning-icon icon-name="utility:close" size="x-small" class="combobox-clear-icon" onclick={handleClearDripListing}></lightning-icon>
                                                                    </template>
                                                                </div>
                                                                <template if:true={isListingDropdownOpen}>
                                                                    <div class="combobox-dropdown" onclick={handleListingDropdownClick}>
                                                                        <div class="combobox-search-wrapper">
                                                                            <input type="text" class="combobox-search-input" placeholder="Search listing..." value={listingSearchTerm} oninput={handleListingSearchInput} />
                                                                        </div>
                                                                        <div class="combobox-options">
                                                                            <template for:each={filteredListingsOptions} for:item="option">
                                                                                <div key={option.value} class="combobox-option" data-value={option.value} data-label={option.label} onclick={handleDripListingSelect}>{option.label}</div>
                                                                            </template>
                                                                        </div>
                                                                    </div>
                                                                </template>
                                                            </div>
                                                        </div>
                                                    </template>
    
                                                    <div class="form-field template-field">
                                                        <label class="form-label"><span style="color: red;">*</span> Template</label>
                                                        <div class="template-selector-inner">
                                                            <div class="template-combobox">
                                                                <lightning-combobox variant="label-hidden" value={selectedDrip.template} options={availableTemplates} data-id={selectedDrip.id} onchange={handleTemplateChange} placeholder="Choose a template..." dropdown-alignment="auto" class="custom-combobox"></lightning-combobox>
                                                            </div>
                                                            <button class="blue-btn-css" data-id={selectedDrip.id}
                                                                onclick={handlePreviewDripTemplate}
                                                                disabled={selectedDrip.hasNoTemplate}>
                                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                                    <path d="M12 5C6 5 2 12 2 12C2 12 6 19 12 19C18 19 22 12 22 12C22 12 18 5 12 5ZM12 16C9.79 16 8 14.21 8 12C8 9.79 9.79 8 12 8C14.21 8 16 9.79 16 12C16 14.21 14.21 16 12 16Z" fill="currentColor"/>
                                                                </svg>
                                                                Preview
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
    
                        <template if:true={isStep3}>
                            <div class="step-recipients-wrapper animate-fade-in">
                                <div class="section-card slds-m-bottom_medium">
                                    <div class="campaign-info-header">
                                        <h3 class="section-title">Campaign Identity</h3>
                                    </div>
                                    <div class="campaign-info-grid">
                                        <div class="config-item">
                                            <lightning-input type="text" name="campaignName" label="Email Campaign Name" value={campaignDetails.campaignName} placeholder="Enter campaign name" data-id="campaignName" onchange={handleCampaignFieldChange} required class="custom-input"></lightning-input>
                                        </div>
                                        <div class="config-item">
                                            <lightning-combobox name="messagingService" label="Messaging Service" value={campaignDetails.messagingService} placeholder="Choose service..." options={messagingServiceOptions} data-id="messagingService" dropdown-alignment="auto" onchange={handleCampaignFieldChange} required class="custom-combobox"></lightning-combobox>
                                        </div>
                                    </div>
                                </div>

                                <div class="recipient-selection-container">
                                    <div class="recipient-grid">
                                        <div class="section-card recipient-list-card primary-recipients">
                                            <div class="recipient-header">
                                                <h3 class="section-title">Primary Recipients</h3>
                                                <div class="badge-count">{totalRecipientCount}</div>
                                            </div>
                                            <div class="combobox-container">
                                                <c-custom-combobox data-id="primary-combo" placeholder="Search contacts..." options={allContactOptions} onselect={handlePrimaryContactSelect} searchable="true" multiselect="true" value={selectedContacts} show-clear-button="true" class="contact-combobox"></c-custom-combobox>
                                                <template if:true={selectedContactsDetails.length}>
                                                    <div class="selected-contacts-pills slds-m-top_small">
                                                        <template for:each={selectedContactsDetails} for:item="contact">
                                                            <span key={contact.id} class="custom-pill slds-pill" title={contact.name}>
                                                                <span class="slds-icon_container slds-icon-standard-account" title="Account">
                                                                    <lightning-icon icon-name="standard:account" alternative-text="Account" size="small"></lightning-icon>
                                                                </span>
                                                                <span class="slds-pill__label">{contact.name}</span>
                                                                <button class="slds-button slds-button_icon slds-pill__remove" title="Remove" name={contact.id} onclick={handleRemovePrimaryContact}>
                                                                    <lightning-icon icon-name="utility:close" alternative-text="Remove"></lightning-icon>
                                                                    <span class="slds-assistive-text">Remove</span>
                                                                </button>
                                                            </span>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                            <template if:true={showBroadcastGroups}>
                                                <div class="broadcast-groups-section slds-m-top_large">
                                                    <div class="section-divider">
                                                        <span>Contact Groups</span>
                                                    </div>
                                                    <div class="broadcast-groups-list">
                                                        <template for:each={filteredBroadcastGroups} for:item="group">
                                                            <div key={group.value} class="group-item-card slds-m-bottom_x-small">
                                                                <input type="checkbox" id={group.value} data-value={group.value} onchange={handleBroadcastGroupChange} checked={group.selected} class="group-checkbox" />
                                                                <label for={group.value} class="group-label">
                                                                    <div class="group-info">
                                                                        <span class="group-name">{group.label}</span>
                                                                        <span class="group-count">{group.contactCount} contacts</span>
                                                                    </div>
                                                                    <div class="checkbox-custom"></div>
                                                                </label>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>

                                        <div class="section-card recipient-list-card cc-recipients">
                                            <div class="recipient-header">
                                                <h3 class="section-title">CC Recipients</h3>
                                                <div class="badge-count">{selectedCCContactsDetails.length}</div>
                                            </div>
                                            <div class="combobox-container">
                                                <c-custom-combobox data-id="cc-combo" placeholder="Search for CC..." options={allContactOptions} onselect={handleCCContactSelect} searchable="true" multiselect="true" value={selectedCCContacts} show-clear-button="true" class="contact-combobox"></c-custom-combobox>
                                                <template if:true={selectedCCContactsDetails.length}>
                                                    <div class="selected-contacts-pills slds-m-top_small">
                                                        <template for:each={selectedCCContactsDetails} for:item="contact">
                                                            <span key={contact.id} class="custom-pill slds-pill pill-cc" title={contact.name}>
                                                                <span class="slds-icon_container slds-icon-standard-account" title="Account">
                                                                    <lightning-icon icon-name="standard:account" alternative-text="Account" size="small"></lightning-icon>
                                                                </span>
                                                                <span class="slds-pill__label">{contact.name}</span>
                                                                <button class="slds-button slds-button_icon slds-pill__remove" title="Remove" name={contact.id} onclick={handleRemoveCCContact}>
                                                                    <lightning-icon icon-name="utility:close" alternative-text="Remove"></lightning-icon>
                                                                    <span class="slds-assistive-text">Remove</span>
                                                                </button>
                                                            </span>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                            <div class="recipient-empty-state" if:false={selectedCCContactsDetails.length}>
                                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                                    <circle cx="9" cy="7" r="4"></circle>
                                                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                                                </svg>
                                                <p>Optional CC Recipients</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
    
                        <template if:true={showFooter}>
                            <footer class="custom-footer">
                                <template for:each={footerButtons} for:item="button">
                                    <button key={button.label} data-action={button.onclick} onclick={handleButtonClick} disabled={button.disabled} class={button.buttonClass}>
                                        <template if:true={button.isBack}>
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M19 12H5M12 19l-7-7 7-7"/>
                                            </svg>
                                        </template>
                                        {button.label}
                                        <template if:true={button.isNext}>
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M5 12h14M12 5l7 7-7 7"/>
                                            </svg>
                                        </template>
                                        <template if:true={button.isFinish}>
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                                            </svg>
                                        </template>
                                    </button>
                                </template>
                            </footer>
                        </template>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
            <template if:true={isPreviewModal}>
                <c-template-preview-modal templateid={selectedTemplateId} objectname={previewObjectName} template-type="Marketing Template" is-active={templateStatus} onclosemodal={handleCloseModal}></c-template-preview-modal>
            </template>
        </div>
    </template>
</template>
