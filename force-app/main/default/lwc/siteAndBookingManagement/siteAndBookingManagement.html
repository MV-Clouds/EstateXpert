<template>
    <template if:true={isLoading}>
        <c-spinner-component></c-spinner-component>
    </template>

    <template if:true={error}>
        <div class="error-message slds-m-around_medium">
            Error loading data: {error}
        </div>
    </template>

    <div class="contacts-container">
        <div class="contacts-header">
            <h2>Related Inquiries</h2>
            <div class="header-actions">
                <button class="blue-btn-css" onclick={handleRefreshData} title="Refresh Data" aria-label="Refresh Data">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M21.5 2V8.5M21.5 8.5H15M21.5 8.5L18 5C16.6 3.5 14.8 2.5 12.6 2.1C8.9 1.5 5.4 3.1 3.5 6.1M2.5 22V15.5M2.5 15.5H9M2.5 15.5L6 19C7.4 20.5 9.2 21.5 11.4 21.9C15.1 22.5 18.6 20.9 20.5 17.9"
                            stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <template if:false={isMobileOrTablet}>Refresh</template>
                </button>
                <template if:false={isMobileOrTablet}>
                    <button class="blue-btn-css" onclick={openScheduleModal} title="View Full Schedule">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M8 2V5M16 2V5M3.5 9.09H20.5M21 8.5V17C21 20 19.5 22 16 22H8C4.5 22 3 20 3 17V8.5C3 5.5 4.5 3.5 8 3.5H16C19.5 3.5 21 5.5 21 8.5Z"
                                stroke="white" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path
                                d="M15.6947 13.7H15.7037M15.6947 16.7H15.7037M11.9955 13.7H12.0045M11.9955 16.7H12.0045M8.29431 13.7H8.30329M8.29431 16.7H8.30329"
                                stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        View Schedule
                    </button>
                </template>
            </div>
        </div>
        <template if:true={isContactDataAvailable}>
            <div class="table-content">
                <table aria-multiselectable="true" class="slds-table slds-table_fixed-layout slds-table_resizable-cols">
                    <thead>
                        <tr class="table_tr_cls slds-line-height_reset">
                            <th aria-sort="none" data-id="Name" onclick={sortClick} class="slds-is-resizable slds-is-sortable slds-cell_action-mode sorting_header" scope="col">
                                <div class="slds-text-link_reset sort-cover slds-has-flexi-truncate" role="button" tabindex="0">
                                    <span class="slds-truncate" title="Name">Name</span>
                                    <span class="slds-icon_container slds-icon-utility-arrowdown">
                                        <svg data-index="Name" class="listing-manager-icon" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M374.6 246.6C368.4 252.9 360.2 256 352 256s-16.38-3.125-22.62-9.375L224 141.3V448c0 17.69-14.33 31.1-31.1 31.1S160 465.7 160 448V141.3L54.63 246.6c-12.5 12.5-32.75 12.5-45.25 0s-12.5-32.75 0-45.25l160-160c12.5-12.5 32.75-12.5 45.25 0l160 160C387.1 213.9 387.1 234.1 374.6 246.6z" />
                                        </svg>
                                    </span>
                                </div>
                            </th>
                            <th aria-sort="none" data-id="Email" onclick={sortClick} class="slds-is-resizable slds-is-sortable slds-cell_action-mode sorting_header" scope="col">
                                <div class="slds-text-link_reset sort-cover slds-has-flexi-truncate" role="button" tabindex="0">
                                    <span class="slds-truncate" title="Email">Email</span>
                                    <span class="slds-icon_container slds-icon-utility-arrowdown">
                                        <svg data-index="Email" class="listing-manager-icon" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M374.6 246.6C368.4 252.9 360.2 256 352 256s-16.38-3.125-22.62-9.375L224 141.3V448c0 17.69-14.33 31.1-31.1 31.1S160 465.7 160 448V141.3L54.63 246.6c-12.5 12.5-32.75 12.5-45.25 0s-12.5-32.75 0-45.25l160-160c12.5-12.5 32.75-12.5 45.25 0l160 160C387.1 213.9 387.1 234.1 374.6 246.6z" />
                                        </svg>
                                    </span>
                                </div>
                            </th>
                            <th aria-sort="none" data-id="MobilePhone" onclick={sortClick} class="slds-is-resizable slds-is-sortable slds-cell_action-mode sorting_header" scope="col">
                                <div class="slds-text-link_reset sort-cover slds-has-flexi-truncate" role="button" tabindex="0">
                                    <span class="slds-truncate" title="Phone">Phone</span>
                                    <span class="slds-icon_container slds-icon-utility-arrowdown">
                                        <svg data-index="MobilePhone" class="listing-manager-icon" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M374.6 246.6C368.4 252.9 360.2 256 352 256s-16.38-3.125-22.62-9.375L224 141.3V448c0 17.69-14.33 31.1-31.1 31.1S160 465.7 160 448V141.3L54.63 246.6c-12.5 12.5-32.75 12.5-45.25 0s-12.5-32.75 0-45.25l160-160c12.5-12.5 32.75-12.5 45.25 0l160 160C387.1 213.9 387.1 234.1 374.6 246.6z" />
                                        </svg>
                                    </span>
                                </div>
                            </th>
                            <th aria-sort="none" data-id="ShowingStatus" onclick={sortClick} class="slds-is-resizable slds-is-sortable slds-cell_action-mode sorting_header" scope="col">
                                <div class="slds-text-link_reset sort-cover slds-has-flexi-truncate" role="button" tabindex="0">
                                    <span class="slds-truncate" title="Showing Status">Showing Status</span>
                                    <span class="slds-icon_container slds-icon-utility-arrowdown">
                                        <svg data-index="ShowingStatus" class="listing-manager-icon" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M374.6 246.6C368.4 252.9 360.2 256 352 256s-16.38-3.125-22.62-9.375L224 141.3V448c0 17.69-14.33 31.1-31.1 31.1S160 465.7 160 448V141.3L54.63 246.6c-12.5 12.5-32.75 12.5-45.25 0s-12.5-32.75 0-45.25l160-160c12.5-12.5 32.75-12.5 45.25 0l160 160C387.1 213.9 387.1 234.1 374.6 246.6z" />
                                        </svg>
                                    </span>
                                </div>
                            </th>
                            <th aria-sort="none" data-id="FormattedScheduleDate" onclick={sortClick} class="slds-is-resizable slds-is-sortable slds-cell_action-mode sorting_header" scope="col">
                                <div class="slds-text-link_reset sort-cover slds-has-flexi-truncate" role="button" tabindex="0">
                                    <span class="slds-truncate" title="Schedule Date">Schedule Date</span>
                                    <span class="slds-icon_container slds-icon-utility-arrowdown">
                                        <svg data-index="FormattedScheduleDate" class="listing-manager-icon" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M374.6 246.6C368.4 252.9 360.2 256 352 256s-16.38-3.125-22.62-9.375L224 141.3V448c0 17.69-14.33 31.1-31.1 31.1S160 465.7 160 448V141.3L54.63 246.6c-12.5 12.5-32.75 12.5-45.25 0s-12.5-32.75 0-45.25l160-160c12.5-12.5 32.75-12.5 45.25 0l160 160C387.1 213.9 387.1 234.1 374.6 246.6z" />
                                        </svg>
                                    </span>
                                </div>
                            </th>
                            <th scope="col">
                                <div>Actions</div>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={contacts} for:item="contact">
                            <tr key={contact.Id}>
                                <td data-label="Name">
                                    <div class="slds-truncate" title={contact.Name}><a href="javascript:void(0);" onclick={navigateToContact}
                                            data-id={contact.Id}>{contact.Name}</a></div>
                                </td>
                                <td data-label="Email">
                                    <div class="slds-truncate" title={contact.Email}>{contact.Email}</div>
                                </td>
                                <td data-label="Phone">
                                    <div class="slds-truncate" title={contact.MobilePhone}>{contact.MobilePhone}</div>
                                </td>
                                <td data-label="Showing Status">
                                    <div class="slds-truncate" title={contact.ShowingStatus}>
                                        <lightning-formatted-text
                                            value={contact.ShowingStatus}></lightning-formatted-text>
                                    </div>
                                </td>
                                <td data-label="Schedule Date">
                                    <div class="slds-truncate" title={contact.FormattedScheduleDate}>{contact.FormattedScheduleDate}</div>
                                </td>
                                <td data-label="Actions">
                                    <div class="action-btn">
                                        <template if:false={isMobileOrTablet}>
                                            <button class="edit-icon-css" onclick={openManageModal} data-contact={contact.Json}
                                                title="Send Email/WhatsApp">
                                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                                    xmlns="http://www.w3.org/2000/svg">
                                                    <path
                                                        d="M21 15C21 15.5304 20.7893 16.0391 20.4142 16.4142C20.0391 16.7893 19.5304 17 19 17H7L3 21V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H19C19.5304 3 20.0391 3.21071 20.4142 3.58579C20.7893 3.96086 21 4.46957 21 5V15Z"
                                                        stroke="#212529" stroke-width="1.5" stroke-linecap="round"
                                                        stroke-linejoin="round" />
                                                    <path d="M8 10L12 12L16 10" stroke="#212529" stroke-width="1.5"
                                                        stroke-linecap="round" stroke-linejoin="round" />
                                                </svg>
                                            </button>
                                        </template>
                                        <button class="preview-icon-css" onclick={openShowingInNewTab}
                                            data-showing-id={contact.ShowingId} disabled={contact.isShowingDisabled}
                                            title="View Showing Record">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                                xmlns="http://www.w3.org/2000/svg">
                                                <path
                                                    d="M13 11L22 2M22 2H16M22 2V8M11 2H9C4 2 2 4 2 9V15C2 20 4 22 9 22H15C20 22 22 20 22 15V13"
                                                    stroke="#212529" stroke-width="2" stroke-linecap="round"
                                                    stroke-linejoin="round" />
                                            </svg>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>
        <template if:false={isContactDataAvailable}>
            <div class="no-prop">
                <img src={NoDataImageUrl} class="no-data-img" alt="No Data Found">
                <p>No related contacts found for this property listing.</p>
            </div>
        </template>
    </div>


    <template if:true={showScheduleModal}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
            aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open slds-modal_medium">
            <div class="slds-modal__container">
                <div class="slds-modal__close closs_icon_css" onclick={closeScheduleModal}>
                    <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z"
                            fill="#1F2937" />
                    </svg>
                </div>
                <header class="slds-modal__header">
                    <h2 class="slds-modal__title custom-modal-header">All Showings</h2>
                </header>
                <div class="calender-modal-body">
                    <div class="calender-cover">
                        <div class="calendar-container">
                            <div class="evo-calendar schedule-calendar"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>


    <template if:true={showManageModal}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
            aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open slds-modal_medium">
            <div class="slds-modal__container">

                <div class="slds-modal__close closs_icon_css" onclick={closeManageModal}>
                    <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z"
                            fill="#1F2937" />
                    </svg>
                </div>

                <div class="slds-modal__header blue-header">
                    <h1 id="modal-heading-01" class="slds-modal__title slds-hyphenate" tabindex="-1">Manage Showing</h1>
                </div>

                <div class="slds-modal__content modal-body">
                    <div class="slds-grid slds-grid_vertical-stretch">
                        <div class="slds-col slds-size_2-of-8 slds-p-around_medium modal-controls">

                            <div class="slds-text-heading_medium slds-m-bottom_medium">
                                Contact: {currentContact.Name}
                            </div>

                            <lightning-combobox name="action" label="Select Action" value={selectedAction}
                                options={actionOptions} onchange={handleActionChange} class="slds-m-bottom_medium"
                                required>
                            </lightning-combobox>

                            <template if:true={showDateTimeInputs}>
                                <label class="slds-form-element__label"><abbr class="slds-required"
                                        title="required">*</abbr> Select Date</label>
                                <lightning-input type="date" name="selectedDate" label="Selected Date"
                                    variant="label-hidden" value={selectedDate} onchange={handleDateChange}
                                    class="slds-m-bottom_small" required>
                                </lightning-input>

                                <lightning-input type="time" name="time" label="Visit Time" value={selectedTime}
                                    onchange={handleTimeChange} class="slds-m-bottom_medium" required
                                    message-when-value-missing="Time is required">
                                </lightning-input>

                                <lightning-combobox name="duration" label="Showing Duration" value={selectedDuration}
                                    options={durationOptions} onchange={handleDurationChange} required class="slds-m-bottom_medium">
                                </lightning-combobox>
                            </template>

                            <template if:true={showCommunicationInputs}>
                                <lightning-combobox name="communicationMethod" label="Communication Method"
                                    options={communicationMethodOptions} value={selectedCommunicationMethod}
                                    onchange={handleCommunicationMethodChange} required
                                    message-when-value-missing="Communication method is required"
                                    class="slds-m-bottom_medium">
                                </lightning-combobox>

                                <template if:true={isWhatsAppSelected}>
                                    <lightning-combobox name="template" label="Select Template"
                                        options={templateOptions} onchange={handleTemplateChange}
                                        value={selectedTemplate} required
                                        message-when-value-missing="Template is required" class="slds-m-bottom_medium">
                                    </lightning-combobox>
                                </template>
                            </template>
                        </div>

                        <div class="slds-col slds-size_6-of-8 slds-p-around_medium slds-border_left modal-preview-area">

                            <!-- <template if:true={showDateTimeInputs}> -->
                            <!-- <h3 class="slds-text-heading_medium slds-m-bottom_small">Select Date</h3> -->
                            <!-- <div class="calendar-container-wrapper">
                                    <div class="evo-calendar manage-calendar"></div>
                                </div> -->
                            <!-- </template> -->

                            <template if:true={showCommunicationInputs}>
                                <h3 class="slds-text-heading_medium slds-m-bottom_small">Live Preview</h3>
                                <div class="slds-box slds-theme_default preview-container">

                                    <template if:true={isWhatsAppSelected}>
                                        <template if:true={selectedTemplate}>
                                            <div class="whatsapp-preview">
                                                <c-template-preview template-id={selectedTemplate}
                                                    record-id={currentShowingId} object-api-name="MVEX__Showing__c">
                                                </c-template-preview>
                                            </div>
                                        </template>
                                        <template if:false={selectedTemplate}>
                                            <div
                                                class="slds-text-align_center slds-text-color_weak slds-p-vertical_medium slds-text-heading_medium action-message-center">
                                                Select a WhatsApp template to preview
                                            </div>
                                        </template>
                                    </template>

                                    <template if:false={isWhatsAppSelected}>
                                        <div class="email-preview-container">
                                            <template if:true={previewEmailHtml}>
                                                <div class="email-preview slds-p-around_medium" lwc:dom="manual">
                                                </div>
                                            </template>
                                            <template if:false={previewEmailHtml}>
                                                <div
                                                    class="slds-text-align_center slds-text-color_weak slds-p-vertical_medium slds-text-heading_medium action-message-center">
                                                    Email preview loading...
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <template if:false={showCommunicationInputsAndDate}>
                                <div
                                    class="slds-box slds-theme_default preview-container slds-text-align_center slds-p-around_large">
                                    <div class="action-message action-message-center">
                                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none"
                                            xmlns="http://www.w3.org/2000/svg">
                                            <path
                                                d="M12 22C17.5 22 22 17.5 22 12C22 6.5 17.5 2 12 2C6.5 2 2 6.5 2 12C2 17.5 6.5 22 12 22Z"
                                                stroke="#10b981" stroke-width="1.5" stroke-linecap="round"
                                                stroke-linejoin="round" />
                                            <path d="M7.75 12L10.58 14.83L16.25 9.17" stroke="#10b981"
                                                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                                        </svg>
                                        <h3 class="slds-text-heading_medium slds-m-top_medium">
                                            You are about to update the status to "{selectedAction}".
                                        </h3>
                                        <p class="slds-m-top_small">Click "{saveButtonLabel}" to confirm.</p>
                                    </div>
                                </div>
                            </template>

                        </div>
                    </div>
                    <div class="footerbtns">
                        <button class="white-btn-css" aria-label="Cancel and close" onclick={closeManageModal}>
                            <svg width="14" height="14" viewBox="0 0 20 20" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z"
                                    fill="currentColor" />
                            </svg>
                            Cancel
                        </button>
                        <button class="blue-btn-css" onclick={handleSave}>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"
                                    fill="currentColor" />
                            </svg>
                            {saveButtonLabel}
                        </button>
                    </div>
                </div>

            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
