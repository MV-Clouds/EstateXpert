<template>
    <lightning-spinner alternative-text="Loading" size="small" if:true={showSpinner}></lightning-spinner>

    <div class="main-template-preview-div">
        <template lwc:if={isTemplateDeleted}>
            <div class="deleted-template-div">
                This Template does not exist anymore!
            </div>
        </template>

        <template lwc:else>
            <!-- Header: shared by both interactive and standard -->
            <div class="header-div template-section-div" if:true={headerBody}>
                <template lwc:if={isTextHeader}>
                    <div class="header-text">
                        <b>{headerBody}</b>
                    </div>
                </template>
                <template lwc:elseif={isImageHeader}>
                    <div class="header-image-div">
                        <img class="header-image" src={headerBody} alt="header-photo">
                    </div>
                </template>
                <template lwc:elseif={isVideoHeader}>
                    <div class="header-image-div">
                        <video class="header-video" src={headerBody} alt="header-video" controls></video>
                    </div>
                </template>
                <template lwc:elseif={isDocHeader}>
                    <div class="header-image-div">
                        <img class="header-image" src={NoPreviewAvailableImg} alt="header-doc">
                    </div>
                </template>
            </div>

            <!-- Body: shared -->
            <div class="body-div template-section-div">
                <div class="body-text" if:true={templateBody}>{templateBody}</div>
            </div>

            <!-- Footer: shared -->
            <div class="footer-div template-section-div">
                <div class="footer-text" if:true={footerBody}>{footerBody}</div>
            </div>

            <!-- Interactive-specific action buttons -->
            <template if:true={isInteractiveTemplate}>
                <template if:true={isInteractiveLocationRequest}>
                    <div class="interactive-action button-label-preview">
                        <lightning-icon icon-name="utility:checkin" size="x-small" class="button-icon"></lightning-icon>
                        <p>{interactiveActionLabel}</p>
                    </div>
                </template>

                <template if:true={isInteractiveButton}>
                    <template if:true={hasInteractiveButtons}>
                        <template for:each={interactiveButtons} for:item="button">
                            <div key={button.id} class="button-label-preview">
                                <lightning-icon icon-name={button.iconName} size="x-small"
                                    class="button-icon"></lightning-icon>
                                <p>{button.btntext}</p>
                            </div>
                        </template>
                    </template>
                </template>

                <template if:true={isInteractiveList}>
                    <div class="interactive-action button-label-preview" if:true={interactiveActionLabel}>
                        <lightning-icon icon-name="utility:list" size="x-small" class="button-icon"></lightning-icon>
                        <p>{interactiveActionLabel}</p>
                    </div>
                </template>
            </template>

            <!-- Standard template buttons -->
            <template if:true={hasStandardButtons}>
                <template for:each={buttonList} for:item="button">
                    <div key={button.id} class="button-label-preview">
                        <lightning-icon icon-name={button.iconName} size="x-small" class="button-icon"></lightning-icon>
                        <p>{button.btntext}</p>
                    </div>
                </template>
            </template>
        </template>
    </div>
</template>
