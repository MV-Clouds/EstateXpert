<!--
  @description       : 
  @author            : ChangeMeIn@UserSettingsUnder.SFDoc
  @group             : 
  @last modified on  : 04-06-2025
  @last modified by  : ChangeMeIn@UserSettingsUnder.SFDoc
-->
<template>
    <template if:true={isLoading}>
        <c-spinner-component></c-spinner-component>
    </template>
    <template if:true={isTemplateVisible}>
        <div class="main">
            <div class="main_header_cls">
                <div class="sub_main_header_css">
                    <div slot="title" class="header_block_css">
                        <div class="svg_back_icon" onclick={backToControlCenter}>
                            <svg width="26" height="22" viewBox="0 0 30 26" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M28.3334 24.224C25.0711 20.2418 22.1742 17.9822 19.6427 17.4454C17.1111 16.9085 14.7009 16.8274 12.412 17.202V24.3334L1.66669 12.6967L12.412 1.66669V8.44469C16.6445 8.47802 20.2427 9.99646 23.2067 13C26.1702 16.0036 27.8791 19.7449 28.3334 24.224Z"
                                    fill="#131314" stroke="#131314" stroke-width="2" stroke-linejoin="round" />
                            </svg>
                        </div>
                        <div class="portal_mapping">
                            Message Templates
                        </div>
                    </div>
                    <div class="header">
                        <template if:false={isMobileOrTablet}>
                            <div class="slds-col header-search-bar-css">
                                <lightning-input variant="label-hidden" class="filter search-div" name="searchInput"
                                    type="search" placeholder="Search Name" onchange={handleChange}></lightning-input>
                            </div>
                            <button class="blue-btn-css" onclick={showCreateTemplate}>
                                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path d="M14 8H8V14H6V8H0V6H6V0H8V6H14V8Z" fill="white" />
                                </svg>
                                Create Template
                            </button>
                            <div class="filter-icon-container" onclick={toggleFilterVisibility}>
                                <template if:false={showFilters}>
                                    <svg class="filter-trigger-icon" width="16" height="16" viewBox="0 0 20 20"
                                        fill="none" xmlns="http://www.w3.org/2000/svg" role="img"
                                        aria-label="Show filters">
                                        <path
                                            d="M2.5 4.16666C2.5 3.70642 2.8731 3.33333 3.33333 3.33333H16.6667C17.1269 3.33333 17.5 3.70642 17.5 4.16666C17.5 4.37407 17.4227 4.57403 17.2833 4.7275L12.5 9.98833V15C12.5 15.2869 12.3522 15.5536 12.1085 15.7062L8.77516 17.7895C8.21834 18.1375 7.5 17.7374 7.5 17.0833V9.98833L2.71667 4.7275C2.5773 4.57403 2.5 4.37407 2.5 4.16666Z"
                                            fill="currentColor" />
                                    </svg>
                                </template>
                                <template if:true={showFilters}>
                                    <svg class="filter-trigger-icon" width="16" height="16" viewBox="0 0 20 20"
                                        fill="none" xmlns="http://www.w3.org/2000/svg" role="img"
                                        aria-label="Hide filters">
                                        <path
                                            d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z"
                                            fill="currentColor" />
                                    </svg>
                                </template>
                            </div>
                            <div if:true={showFilters} class="filter-backdrop" onclick={toggleFilterVisibility}></div>
                            <div if:true={showFilters} class="filter-dropdown-box">
                                <div class="filter-section">
                                    <label class="filter-label">Category</label>
                                    <select name="category" class="filter filter-dropdown" value={categoryValue}
                                        onchange={handleChange}>
                                        <template for:each={categoryOptions} for:item="option">
                                            <option key={option.value} value={option.value} class="filter-option">
                                                {option.label}</option>
                                        </template>
                                    </select>
                                </div>
                                <div class="filter-section">
                                    <label class="filter-label">Status</label>
                                    <select name="status" class="filter filter-dropdown" value={statusValues}
                                        onchange={handleChange}>
                                        <template for:each={statusOptions} for:item="option">
                                            <option key={option.value} value={option.value} class="filter-option">
                                                {option.label}</option>
                                        </template>
                                    </select>
                                </div>
                                <div class="filter-section">
                                    <label class="filter-label">Time Period</label>
                                    <select name="timePeriod" class="filter filter-dropdown" value={timePeriodValue}
                                        onchange={handleChange}>
                                        <template for:each={timePeriodOptions} for:item="option">
                                            <option key={option.value} value={option.value} class="filter-option">
                                                {option.label}</option>
                                        </template>
                                    </select>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="main_content_cls">
                <template if:true={filteredRecords.length}>
                    <div class="table-content">
                        <table class="slds-table">
                            <thead>
                                <tr class="table_tr_cls">
                                    <th scope="col" class="sno">
                                        <div>No.</div>
                                    </th>
                                    <th data-id="MVEX__Template_Name__c" onclick={sortClick} aria-sort="none"
                                        class="slds-is-resizable slds-is-sortable slds-cell_action-mode sorting_header"
                                        scope="col">
                                        <div class="slds-text-link_rese sort-cover slds-has-flexi-truncate"
                                            role="button" tabindex="0">
                                            <span class="slds-truncate" title="Title">Template Name</span>
                                            <span class="slds-icon_container slds-icon-utility-arrowdown">
                                                <svg data-index="MVEX__Template_Name__c" class="listing-manager-icon"
                                                    viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                                                    <path
                                                        d="M374.6 246.6C368.4 252.9 360.2 256 352 256s-16.38-3.125-22.62-9.375L224 141.3V448c0 17.69-14.33 31.1-31.1 31.1S160 465.7 160 448V141.3L54.63 246.6c-12.5 12.5-32.75 12.5-45.25 0s-12.5-32.75 0-45.25l160-160c12.5-12.5 32.75-12.5 45.25 0l160 160C387.1 213.9 387.1 234.1 374.6 246.6z" />
                                                </svg>
                                            </span>
                                        </div>
                                    </th>
                                    <th data-id="MVEX__Template_Category__c" onclick={sortClick} aria-sort="none"
                                        class="slds-is-resizable slds-is-sortable slds-cell_action-mode sorting_header"
                                        scope="col">
                                        <div class="slds-text-link_rese sort-cover slds-has-flexi-truncate"
                                            role="button" tabindex="0">
                                            <span class="slds-truncate" title="Title">Category</span>
                                            <span class="slds-icon_container slds-icon-utility-arrowdown">
                                                <svg data-index="MVEX__Template_Category__c"
                                                    class="listing-manager-icon" viewBox="0 0 384 512"
                                                    xmlns="http://www.w3.org/2000/svg">
                                                    <path
                                                        d="M374.6 246.6C368.4 252.9 360.2 256 352 256s-16.38-3.125-22.62-9.375L224 141.3V448c0 17.69-14.33 31.1-31.1 31.1S160 465.7 160 448V141.3L54.63 246.6c-12.5 12.5-32.75 12.5-45.25 0s-12.5-32.75 0-45.25l160-160c12.5-12.5 32.75-12.5 45.25 0l160 160C387.1 213.9 387.1 234.1 374.6 246.6z" />
                                                </svg>
                                            </span>
                                        </div>
                                    </th>
                                    <th data-id="LanguageLabel" onclick={sortClick} aria-sort="none"
                                        class="slds-is-resizable slds-is-sortable slds-cell_action-mode sorting_header"
                                        scope="col">
                                        <div class="slds-text-link_rese sort-cover slds-has-flexi-truncate"
                                            role="button" tabindex="0">
                                            <span class="slds-truncate" title="Title">Language</span>
                                            <span class="slds-icon_container slds-icon-utility-arrowdown">
                                                <svg data-index="LanguageLabel" class="listing-manager-icon"
                                                    viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                                                    <path
                                                        d="M374.6 246.6C368.4 252.9 360.2 256 352 256s-16.38-3.125-22.62-9.375L224 141.3V448c0 17.69-14.33 31.1-31.1 31.1S160 465.7 160 448V141.3L54.63 246.6c-12.5 12.5-32.75 12.5-45.25 0s-12.5-32.75 0-45.25l160-160c12.5-12.5 32.75-12.5 45.25 0l160 160C387.1 213.9 387.1 234.1 374.6 246.6z" />
                                                </svg>
                                            </span>
                                        </div>
                                    </th>
                                    <th data-id="MVEX__Status__c" onclick={sortClick} aria-sort="none"
                                        class="slds-is-resizable slds-is-sortable slds-cell_action-mode sorting_header"
                                        scope="col">
                                        <div class="slds-text-link_rese sort-cover slds-has-flexi-truncate"
                                            role="button" tabindex="0">
                                            <span class="slds-truncate" title="Title">Status</span>
                                            <span class="slds-icon_container slds-icon-utility-arrowdown">
                                                <svg data-index="MVEX__Status__c" class="listing-manager-icon"
                                                    viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                                                    <path
                                                        d="M374.6 246.6C368.4 252.9 360.2 256 352 256s-16.38-3.125-22.62-9.375L224 141.3V448c0 17.69-14.33 31.1-31.1 31.1S160 465.7 160 448V141.3L54.63 246.6c-12.5 12.5-32.75 12.5-45.25 0s-12.5-32.75 0-45.25l160-160c12.5-12.5 32.75-12.5 45.25 0l160 160C387.1 213.9 387.1 234.1 374.6 246.6z" />
                                                </svg>
                                            </span>
                                        </div>
                                    </th>
                                    <th data-id="LastModifiedDate" onclick={sortClick} aria-sort="none"
                                        class="slds-is-resizable slds-is-sortable slds-cell_action-mode sorting_header"
                                        scope="col">
                                        <div class="slds-text-link_rese sort-cover slds-has-flexi-truncate"
                                            role="button" tabindex="0">
                                            <span class="slds-truncate" title="Title">Last Modified Date</span>
                                            <span class="slds-icon_container slds-icon-utility-arrowdown">
                                                <svg data-index="LastModifiedDate" class="listing-manager-icon"
                                                    viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                                                    <path
                                                        d="M374.6 246.6C368.4 252.9 360.2 256 352 256s-16.38-3.125-22.62-9.375L224 141.3V448c0 17.69-14.33 31.1-31.1 31.1S160 465.7 160 448V141.3L54.63 246.6c-12.5 12.5-32.75 12.5-45.25 0s-12.5-32.75 0-45.25l160-160c12.5-12.5 32.75-12.5 45.25 0l160 160C387.1 213.9 387.1 234.1 374.6 246.6z" />
                                                </svg>
                                            </span>
                                        </div>
                                    </th>
                                    <th scope="col" class="actions">
                                        <div>Actions</div>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={visibleRecords} for:item="record" for:index="index">
                                    <tr key={record.id}>
                                        <td data-label="S.No.">
                                            <div>{record.serialNumber}</div>
                                        </td>
                                        <td data-label="Template Name" class="truncate_css">
                                            <div>{record.MVEX__Template_Name__c}</div>
                                        </td>
                                        <td data-label="Template Category" class="truncate_css">
                                            <div>{record.MVEX__Template_Category__c}</div>
                                        </td>
                                        <td data-label="Language" class="truncate_css">
                                            <div>{record.LanguageLabel}</div>
                                        </td>
                                        <td data-label="Status" class="truncate_css status-col">
                                            <div class={record.statusClass}>{record.MVEX__Status__c}</div>
                                        </td>
                                        <td data-label="Last Modified Date" class="truncate_css">
                                            <div>{record.LastModifiedDate}</div>
                                        </td>
                                        <td data-label="Actions">
                                            <div class="action-btn">
                                                <template if:false={isMobileOrTablet}>
                                                    <button class="preview-icon-css" data-id={record.id}
                                                        onclick={previewTemplate}>
                                                        <svg width="15" height="15" fill="#000000"
                                                            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52"
                                                            enable-background="new 0 0 52 52" xml:space="preserve">
                                                            <path
                                                                d="M51.8,25.1C47.1,15.6,37.3,9,26,9S4.9,15.6,0.2,25.1c-0.3,0.6-0.3,1.3,0,1.8C4.9,36.4,14.7,43,26,43 s21.1-6.6,25.8-16.1C52.1,26.3,52.1,25.7,51.8,25.1z M26,37c-6.1,0-11-4.9-11-11s4.9-11,11-11s11,4.9,11,11S32.1,37,26,37z">
                                                            </path>
                                                            <path
                                                                d="M26,19c-3.9,0-7,3.1-7,7s3.1,7,7,7s7-3.1,7-7S29.9,19,26,19z">
                                                            </path>
                                                        </svg>
                                                    </button>
                                                    <button class="edit-icon-css" data-id={record.id}
                                                        onclick={editTemplate} disabled={record.isButtonDisabled}
                                                        title={record.editRestrictionMessage}>
                                                        <svg width="15" height="15" viewBox="0 0 14 14" fill="none"
                                                            xmlns="http://www.w3.org/2000/svg">
                                                            <path
                                                                d="M13.0416 13.0417H8.45831M0.958313 13.0417L4.49998 12.2083L12.2441 4.46426C12.5695 4.13882 12.5695 3.61119 12.2441 3.28575L10.7142 1.75593C10.3888 1.43049 9.86115 1.43049 9.53573 1.75593L1.79165 9.50001L0.958313 13.0417Z"
                                                                stroke="#212529" stroke-width="1.25"
                                                                stroke-linecap="round" stroke-linejoin="round" />
                                                        </svg>
                                                    </button>
                                                    <button class="clone-icon-css" data-id={record.id}
                                                        onclick={handleCloneClick}>
                                                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                                                            xmlns="http://www.w3.org/2000/svg">
                                                            <path
                                                                d="M8 8H7.2C6.0799 8 5.51984 8 5.09202 8.21799C4.71569 8.40973 4.40973 8.71569 4.21799 9.09202C4 9.51984 4 10.0799 4 11.2V16.8C4 17.9201 4 18.4802 4.21799 18.908C4.40973 19.2843 4.71569 19.5903 5.09202 19.782C5.51984 20 6.0799 20 7.2 20H12.8C13.9201 20 14.4802 20 14.908 19.782C15.2843 19.5903 15.5903 19.2843 15.782 18.908C16 18.4802 16 17.9201 16 16.8V16M11.2 16H16.8C17.9201 16 18.4802 16 18.908 15.782C19.2843 15.5903 19.5903 15.2843 19.782 14.908C20 14.4802 20 13.9201 20 12.8V7.2C20 6.0799 20 5.51984 19.782 5.09202C19.5903 4.71569 19.2843 4.40973 18.908 4.21799C18.4802 4 17.9201 4 16.8 4H11.2C10.0799 4 9.51984 4 9.09202 4.21799C8.71569 4.40973 8.40973 4.71569 8.21799 5.09202C8 5.51984 8 6.07989 8 7.2V12.8C8 13.9201 8 14.4802 8.21799 14.908C8.40973 15.2843 8.71569 15.5903 9.09202 15.782C9.51984 16 10.0799 16 11.2 16Z"
                                                                stroke="#000000" stroke-width="2" stroke-linecap="round"
                                                                stroke-linejoin="round">
                                                            </path>
                                                        </svg>
                                                    </button>
                                                </template>
                                                <button class="delete-icon-css" data-id={record.id}
                                                    onclick={deleteTemplate}>
                                                    <svg width="15" height="15" viewBox="0 0 14 14" fill="none"
                                                        xmlns="http://www.w3.org/2000/svg">
                                                        <path
                                                            d="M2.62502 3.45834L3.32598 11.5194C3.40087 12.3807 4.12187 13.0417 4.98638 13.0417H9.01369C9.87819 13.0417 10.5992 12.3807 10.674 11.5194L11.375 3.45834M5.12502 3.25V2.625C5.12502 1.70453 5.87119 0.958336 6.79169 0.958336H7.20835C8.12885 0.958336 8.87502 1.70453 8.87502 2.625V3.25M1.16669 3.45834H12.8334"
                                                            stroke="#212529" stroke-width="1.25" stroke-linecap="round"
                                                            stroke-linejoin="round" />
                                                    </svg>
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <template if:true={showPagination}>
                        <div class="paginationDiv">
                            <div class="btnCover">
                                <div class="pagination-container">
                                    <button class="pagination-btn-css" disabled={isFirstPage} onclick={handlePrevious}>
                                        <svg xmlns="http://www.w3.org/2000/svg" height="52" width="52"
                                            viewBox="0 0 520 520" fill="#fff">
                                            <path
                                                d="M342 477 134 272c-6-6-6-16 0-22L342 45c6-6 16-6 22 0l22 22c6 6 6 16 0 22L221 250c-6 6-6 16 0 22l163 161c6 6 6 16 0 22l-22 22c-5 5-14 5-20 0z" />
                                        </svg>
                                        Previous
                                    </button>
                                    <template for:each={pageNumbers} for:item="page">
                                        <template if:false={page.isEllipsis}>
                                            <button key={page.number} data-id={page.number} class={page.className}
                                                onclick={handlePageChange}>
                                                {page.number}
                                            </button>
                                        </template>
                                        <template if:true={page.isEllipsis}>
                                            <span key={page.number} class="pagination-ellipsis">...</span>
                                        </template>
                                    </template>
                                    <button class="pagination-btn-css" disabled={isLastPage} onclick={handleNext}>
                                        Next
                                        <svg xmlns="http://www.w3.org/2000/svg" height="52" width="52"
                                            viewBox="0 0 520 520" fill="#fff">
                                            <path
                                                d="m179 44 207 205c6 6 6 16 0 22L179 476c-6 6-16 6-22 0l-22-22c-6-6-6-16 0-22l163-161c6-6 6-16 0-22L136 88c-6-6-6-16 0-22l22-22c6-5 15-5 21 0z" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </template>
                </template>
                <template if:false={filteredRecords.length}>
                    <div class="no-records-message">
                        <div class="empty-state">
                            <div class="empty-state__content">
                                <div class="empty-state__icon">
                                    <img src="/resource/MVEX__emptyState" alt="" draggable="false">
                                </div>
                                <div class="empty-state__message">No data available to show</div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <template if:true={showPopup}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
            aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open slds-modal_medium">
            <div class="slds-modal__container preview-container">
                <div class="slds-modal__content slds-p-around_medium template-preview" id="modal-content-id-2">
                    <c-wb-preview-template-page templateid={selectedTemplateId}
                        onclosepopup={handlePopupClose}></c-wb-preview-template-page>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template if:true={isCloneModalOpen}>
        <section role="dialog" tabindex="-1" aria-labelledby="wb-clone-modal-heading" aria-modal="true"
            aria-describedby="wb-clone-modal-content" class="slds-modal slds-fade-in-open slds-modal_small">
            <div class="slds-modal__container">

                <!-- Close (X) button -->
                <div class="slds-modal__close close-icon-css" onclick={handleCloneModalClose}>
                    <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z"
                            fill="currentColor" />
                    </svg>
                </div>

                <!-- Header -->
                <div class="slds-modal__header clone-blue-header">
                    <h1 id="wb-clone-modal-heading" class="slds-modal__title slds-hyphenate" tabindex="-1">Clone
                        Template</h1>
                </div>

                <!-- Body + Footer -->
                <div class="slds-modal__content clone-modalbody" id="wb-clone-modal-content">
                    <div class="clone-content_body">
                        <p class="clone-modal-subtitle">
                            Enter a unique name for the cloned message template. The template content,
                            components, and configuration will be duplicated as a new Draft — allowing you
                            to customise it independently without affecting the original. Template names
                            must be lowercase, alphanumeric, and may contain underscores only.
                        </p>
                        <div class="clone-name-field">
                            <label class="clone-name-label" for="wbCloneTemplateNameInput">
                                <span class="clone-red">*</span> New Template Name
                            </label>
                            <div class="clone-input-container">
                                <lightning-input id="wbCloneTemplateNameInput"
                                    placeholder="Enter name for the cloned template"
                                    name="wbCloneTemplateName" value={cloneTemplateName} variant="label-hidden"
                                    onchange={handleCloneNameChange} maxlength="255">
                                </lightning-input>
                                <template if:true={cloneNameError}>
                                    <p class="clone-name-error clone-red">{cloneNameError}</p>
                                </template>
                            </div>
                        </div>
                    </div>

                    <!-- Footer buttons -->
                    <div class="clone-footerbtns">
                        <button onclick={handleCloneModalClose} class="white-btn-css">
                            <svg width="14" height="14" viewBox="0 0 20 20" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M2.53317 19.3333L0.666504 17.4667L8.13317 9.99999L0.666504 2.53332L2.53317 0.666656L9.99984 8.13332L17.4665 0.666656L19.3332 2.53332L11.8665 9.99999L19.3332 17.4667L17.4665 19.3333L9.99984 11.8667L2.53317 19.3333Z"
                                    fill="currentColor" />
                            </svg>
                            Cancel
                        </button>
                        <button onclick={handleCloneConfirm} class="blue-btn-css" disabled={isCloneDisabled}>
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <rect x="8" y="8" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8"
                                    stroke-linecap="round" stroke-linejoin="round" />
                                <path
