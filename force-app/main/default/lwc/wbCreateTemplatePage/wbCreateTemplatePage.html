<!--

  @author            : Harsh Gandhi
  @group             : 
  @last modified on  : 03-04-2026

<template>
    <template if:true={iseditTemplatevisible}>
        <div class="main-container">

            <template if:true={isLoading}>
                <div class="spinner-overlay">
                    <c-spinner-component></c-spinner-component>
                </div>
            </template>

            <div class="slds-theme_default main">
                <div class="main_header_cls">
                    <div class="sub_main_header_css">
                        <div class="header_block_css">
                            <div class="svg_back_icon" onclick={handlePrevclick}>
                                <svg width="26" height="22" viewBox="0 0 30 26" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M28.3334 24.224C25.0711 20.2418 22.1742 17.9822 19.6427 17.4454C17.1111 16.9085 14.7009 16.8274 12.412 17.202V24.3334L1.66669 12.6967L12.412 1.66669V8.44469C16.6445 8.47802 20.2427 9.99646 23.2067 13C26.1702 16.0036 27.8791 19.7449 28.3334 24.224Z" fill="#131314" stroke="#131314" stroke-width="2" stroke-linejoin="round" />
                                </svg>
                            </div>
                            <div class="portal_mapping">
                                <template lwc:if={isTemplateClone}>
                                    Clone Template
                                </template>
                
                                <template lwc:elseif={isEditTemplate}>
                                    Edit Template
                                </template>
                
                                <template lwc:elseif={isNewTemplate}>
                                    New Template
                                </template>
                            </div>
                        </div>
                        <div class="header">
                            <button class="blue-btn-css" onclick={handleConfirm} disabled={isSubmitDisabled}>
                                <svg fill="#ffffff" height="14" width="14" version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512.01 512.01" xml:space="preserve" stroke="#ffffff">
                                    <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                                    <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                                    <g id="SVGRepo_iconCarrier">
                                        <g>
                                            <g>
                                                <path d="M505.754,240.923L271.088,6.256c-3.989-4.011-9.408-6.251-15.083-6.251H21.338c-8.619,0-16.427,5.184-19.712,13.163 c-3.307,7.979-1.472,17.152,4.629,23.253l219.584,219.584L6.256,475.59c-6.101,6.101-7.936,15.275-4.629,23.253 c3.285,7.979,11.093,13.163,19.712,13.163h234.667c5.675,0,11.093-2.24,15.083-6.251l234.667-234.667 C514.096,262.747,514.096,249.264,505.754,240.923z">
                                                </path>
                                            </g>
                                        </g>
                                    </g>
                                </svg>
                                Submit for Review
                            </button>
                        </div>
                    </div>
                </div>

                <div class="divcontainer2">
                    <div class="createtempdiv2">
                        <div class="slds-theme_default templateContent3">
                            <div class="tempHead">
                                <p class="name-language">Template name and language</p>
                            </div>
                            <div class="nameLan">
                                <div class="namediv">
                                    <label for="templateName">Name your template</label>
                                    <input class="nameInput" type="text" id="templateName" name="templateName"
                                        value={templateName} maxlength="512" placeholder="Enter template name"
                                        disabled={templateNameDisabled} oninput={handleInputChange} />
                                    <p class="char-count tempname-count">{templateName.length}/{LIMITS.maxTempNamelength}
                                    </p>
                                </div>
                                <div class="landiv">
                                    <label for="languageSelect">Select Language</label>
                                    <select name="language" class="lanInput" onchange={handleInputChange}>
                                        <template for:each={languageOptions} for:item="option">
                                            <option key={option.value} value={option.value}
                                                selected={option.isSelected}>{option.label}</option>
                                        </template>
                                    </select>
                                </div>

                            </div>
                            <template if:true={templateExists}>
                                <div class="error-text">This name is reserved for sample templates, please
                                    enter a different one.</div>
                            </template>
                        </div>

                        <template if:true={flowBooleanCheck}>
                            <div class="slds-theme_default authContent4">
                                <div class="tempHead">
                                    <p class="content">Flow setup</p>
                                </div>
                                
                                <template if:false={isFlowSelected}>
                                    <div class="chooseDoc">
                                        <div class="custom-upload-button" onclick={openModal}>
                                            <label class="upload-label">
                                                <img src="/resource/MVEX__uploadDocIcon" alt="Upload Icon" class="upload-icon" />
                                                <template if:true={NoFileSelected}>
                                                    <span>Choose Flow</span>
                                                </template>
                                                
                                            </label>
                                        </div>
                                    </div>
                                
                                    <template if:true={isModalOpen}>
                                        <c-flow-preview-model onclose={closeModal} onsubmit={handleFlowSelection}></c-flow-preview-model>
                                    </template>
                                    
                                    
                                </template>
                                <template if:true={isFlowSelected}>
                                    <template if:true={selectedFlow}>
                                        <div class="flow-details">
                                            <p class='flow-name' title={selectedFlow.name}>{selectedFlow.name}</p>
                                            <button class="flow-action-btn flow-action-btn-preview" title="previewFlow" onclick={modalPreview}>Preview</button>
                                            <button class="flow-action-btn flow-action-btn-delete" title="deleteFlow" onclick={handleFlowDeleteClick}>Delete</button>
                                        </div>
                                    </template>
                                </template>

                            
                            </div>
                        </template>
                        <template if:true={isDefault}>
                            <div class="slds-theme_default templateContent4">
                                <div class="tempHead">
                                    <p class="content">Content</p>
                                </div>
                                <div class="descp">
                                    <p>Fill in the header, body and footer sections of your template.</p>
                                </div>

                                <!-- Type of variable dropdown - Hidden for now, will be added in future -->
                                <!-- <div class="variable-type-container global-variable-type">
                                    <label class="object-selector-label">Type of variable</label>
                                    <lightning-combobox 
                                        class="variable-type-dropdown"
                                        variant="label-hidden"
                                        value={selectedVariableType}
                                        options={variableTypeOptions}
                                        onchange={handleGlobalVariableTypeChange}>
                                    </lightning-combobox>
                                </div> -->

                                <template if:true={showDefaultBtn}>
                                    <div class="formatted-text3">
                                        <span class="seg-header">Header</span>
                                        <span class="seg-opt">Optional</span>
                                    </div>
                                    <div class="contentType">
                                        <select class="conInput" name="progress" onchange={handleContentType} value={selectedContentType}>
                                            <template for:each={typeOptions} for:item="option">
                                                <option key={option.value} value={option.value}>{option.label}</option>
                                            </template>
                                        </select>
                                    </div>
                                    <template if:true={addMedia}>
                                        <div class="add-variable">
                                            <div class="body-title">
                                                <p>Variable Samples</p>
                                            </div>
                                            <div class="descp2">
                                                <p>Include samples of all variables in your message to help Meta review your template. Remember not to include any customer information to protect your customer's privacy.</p>
                                            </div>
                                            <template if:true={isImageFileUploader}>
                                                <div class="chooseImage">
                                                    <p class="uploadlabel">Image</p>
                                                    <div class="custom-upload-button">
                                                        <label class="upload-label">
                                                            <img src="/resource/MVEX__uploadImgIcon" alt="Upload Icon"
                                                                class="upload-icon" />
                                                            <template if:true={NoFileSelected}>
                                                                <span>Choose JPG or PNG file</span>
                                                            </template>
        
                                                            <template if:true={isfilename}>
                                                                <span>{fileName}</span>
                                                            </template>
                                                            <input type="file" accept="image/png, image/jpeg,image/jpg" class="file-input" onchange={handleFileChange} />
                                                        </label>
                                                    </div>
                                                    <template if:true={isfilename}>
                                                        <div>
                                                            <lightning-button-icon icon-name="utility:close"
                                                                alternative-text="Remove" onclick={handleDelete} class="remove-File">
                                                            </lightning-button-icon>
                                                        </div>
                                                    </template>
                                                   
                                                </div>
                                            </template>
                                            <template if:true={isVideoFileUploader}>
                                                <div class="chooseVideo">
                                                    <p class="uploadlabel">Video</p>
                                                    <div class="custom-upload-button">
                                                        <label class="upload-label">
                                                            <img src="/resource/MVEX__uploadvideoIcon" alt="Upload Icon"
                                                                class="upload-icon" />
                                                            <template if:true={NoFileSelected}>
                                                                <span>Choose MP4 file</span>
                                                            </template>
        
                                                            <template if:true={isfilename}>
                                                                <span>{fileName}</span>
                                                            </template>
                                                            <input type="file" accept="video/mp4" class="file-input" onchange={handleFileChange} />
                                                        </label>
                                                    </div>
                                                    <template if:true={isfilename}>
                                                        <div>
                                                            <button class="native-close-button" onclick={handleDelete} title="Remove">
                                                                <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
                                                                    <path d="M31.1 25.9l10.6-10.6c.3-.3.3-.8 0-1.1l-2.1-2.1c-.3-.3-.8-.3-1.1 0L27.9 22.8c-.3.3-.8.3-1.1 0L16.2 12.1c-.3-.3-.8-.3-1.1 0l-2.1 2.1c-.3.3-.3.8 0 1.1l10.6 10.6c.3.3.3.8 0 1.1L12.9 37.7c-.3.3-.3.8 0 1.1l2.1 2.1c.3.3.8.3 1.1 0l10.6-10.6c.3-.3.8-.3 1.1 0l10.6 10.6c.3.3.8.3 1.1 0l2.1-2.1c.3-.3.3-.8 0-1.1L29.9 27c-.2-.3-.2-.8.1-1.1z"/>
                                                                </svg>
                                                            </button>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                            <template if:true={isDocFileUploader}>
                                                <div class="chooseDoc">
                                                    <p class="uploadlabel">Document</p>
                                                    <div class="custom-upload-button">
                                                        <label class="upload-label">
                                                            <img src="/resource/MVEX__uploadDocIcon" alt="Upload Icon"
                                                                class="upload-icon" />
                                                            <template if:true={NoFileSelected}>
                                                                <span>Choose PDF file</span>
                                                            </template>
                                                            <template if:true={isfilename}>
                                                                <span>{fileName}</span>
                                                            </template>
                                                            <input type="file" accept="application/pdf" class="file-input" onchange={handleFileChange} />
                                                        </label>
                                                    </div>
                                                    <template if:true={isfilename}>
                                                        <div>
                                                            <button class="native-close-button" onclick={handleDelete} title="Remove">
                                                                <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
                                                                    <path d="M31.1 25.9l10.6-10.6c.3-.3.3-.8 0-1.1l-2.1-2.1c-.3-.3-.8-.3-1.1 0L27.9 22.8c-.3.3-.8.3-1.1 0L16.2 12.1c-.3-.3-.8-.3-1.1 0l-2.1 2.1c-.3.3-.3.8 0 1.1l10.6 10.6c.3.3.3.8 0 1.1L12.9 37.7c-.3.3-.3.8 0 1.1l2.1 2.1c.3.3.8.3 1.1 0l10.6-10.6c.3-.3.8-.3 1.1 0l10.6 10.6c.3.3.8.3 1.1 0l2.1-2.1c.3-.3.3-.8 0-1.1L29.9 27c-.2-.3-.2-.8.1-1.1z"/>
                                                                </svg>
                                                            </button>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    
                                    <template if:true={IsHeaderText}>
                                        <div class="content-inputs">
                                            <div class="header-composite">
                                                <input class="con" type="text" maxlength="60" name="header"
                                                    value={header} oninput={handleInputChange}
                                                    placeholder="Add a short line of text to the header of your message" />

                                                <p class="char-count header-count">{header.length}/{LIMITS.maxShortlength}
                                                </p>
                                            </div>
                                        </div>
                                        <div class="header-variable-btn-container">
                                            <button class="toolbar-button custom-button richtext" onclick={addheadervariable} disabled={buttonDisabled} style="display: flex; align-items: center; font-weight: 500; font-size: 15px; color: #1a1a1a; padding: 6px 8px;">
                                                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                                Add variable
                                            </button>
                                            <lightning-helptext content="Add variables by selecting columns from your customer list. When your message is sent, the variable will be replaced with data from the column." icon-variant="bare" style="margin-left: 4px; --slds-c-icon-color-foreground-default: #4b4b4b;"></lightning-helptext>
                                        </div>
                                        <template if:true={headerError}>
                                            <div class="slds-text-color_error slds-m-top_small margin-top-zero">
                                                {headerError}
                                            </div>
                                        </template>
                                        <template if:true={headerVariableFormatError}>
                                            <p class="error-text">{headerVariableFormatError}</p>
                                        </template>

                                        <template if:true={addHeaderVar}>
                                            <div class="add-variable">
                                                <div class="body-title">
                                                    <p>Variable Samples</p>
                                                </div>
                                                <div class="descp2">
                                                    <p>Include samples of all variables in your message to help Meta review your template. Remember not to include any customer information to protect your customer’s privacy.</p>
                                                </div>

                                                <div class="body-label">
                                                    <p>Header</p>
                                                </div>
                                                
                                                <!-- Single Object Selector for Header -->
                                                <div class="object-selector-container">
                                                    <label class="object-selector-label">Select Object</label>
                                                    <select class="object-dropdown dropdown" onchange={handleObjectChange}>
                                                        <template for:each={availableObjectsWithSelection} for:item="object">
                                                            <option key={object.value} value={object.value} selected={object.isSelected}>
                                                                {object.label}
                                                            </option>
                                                        </template>
                                                    </select>
                                                </div>

                                                <template for:each={computedHeaderVariables} for:item="varItem"
                                                    for:index="index">
                                                    <div key={varItem.id} class="true-div">
                                                        <p class="var">{varItem.index}</p>

                                                        <!-- Merge Field Selector Component for Header -->
                                                        <div class="merge-field-selector-container">
                                                            <c-wb-merge-field-selector
                                                                selected-object={selectedObject}
                                                                selected-field-path={varItem.field}
                                                                selected-field-label={varItem.fieldLabel}
                                                                max-hierarchy-level={LIMITS.maxHierarchyLevel}
                                                                placeholder="Search fields..."
                                                                data-index={varItem.index}
                                                                data-is-header="true"
                                                                onfieldselected={handleMergeFieldSelected}>
                                                            </c-wb-merge-field-selector>
                                                        </div>

                                                        <!-- Alternate Text / Example Input - Show for both Name and Number types -->
                                                        <input type="text" class="alternate-text dropdown border-none"
                                                            placeholder={varItem.placeholderText}
                                                            value={varItem.alternateText} data-id={varItem.id}
                                                            onchange={handleAlternateTextChange}
                                                            required />

                                                        <div class="closeButton">
                                                            <button class="native-close-button" onclick={handleHeaderVarRemove} data-index={index} title="Remove">
                                                                <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
                                                                    <path d="M31.1 25.9l10.6-10.6c.3-.3.3-.8 0-1.1l-2.1-2.1c-.3-.3-.8-.3-1.1 0L27.9 22.8c-.3.3-.8.3-1.1 0L16.2 12.1c-.3-.3-.8-.3-1.1 0l-2.1 2.1c-.3.3-.3.8 0 1.1l10.6 10.6c.3.3.3.8 0 1.1L12.9 37.7c-.3.3-.3.8 0 1.1l2.1 2.1c.3.3.8.3 1.1 0l10.6-10.6c.3-.3.8-.3 1.1 0l10.6 10.6c.3.3.8.3 1.1 0l2.1-2.1c.3-.3.3-.8 0-1.1L29.9 27c-.2-.3-.2-.8.1-1.1z"/>
                                                                </svg>
                                                            </button>
                                                        </div>
                                                        
                                                    </div>
                                                </template>
                                                
                                            </div>
                                        </template>
                                    </template>
                                </template>
                                <div class="body">
                                    <label for="body" class="body-label">Body</label>
                                    <textarea name="tempBody" class="body-area" oninput={handleInputChange}
                                        onkeypress={handleKeyDown} maxlength="1024" rows="4"
                                        cols="50">{tempBody}</textarea>
                                    <p class="char-count body-count">{tempBody.length}/{LIMITS.maxTempBodyLength}</p>
                                    <template if:true={bodyVariablePlacementError}>
                                        <p class="error-text">{bodyVariablePlacementError}</p>
                                    </template>
                                    <template if:true={bodyVariableFormatError}>
                                        <p class="error-text">{bodyVariableFormatError}</p>
                                    </template>
                                </div>
                                <div class="rich-button">
                                    <template if:true={showEmojis}>
                                        <div class="emoji-picker-div">
                                            <template for:each={emojiCategories} for:item="category">
                                                <div key={category.category} class="emoji-category-div">
                                                    <h3 class="catagory-name">{category.category}</h3>
                                                    <div class="emoji-tray">
                                                        <template for:each={category.emojis} for:item="item">
                                                            <div key={item} class="emoji" title={item.description}
                                                                onclick={handleEmojiSelection}>{item.emoji}</div>
                                                        </template>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </template>

                                    <div class="inner-rich" style="display: flex; justify-content: flex-end; align-items: center; gap: 8px; background: transparent;">
                                        <div style="display: flex; align-items: center; gap: 8px;">
                                            <button class="toolbar-button" onclick={handleEmoji} title="Emoji" style="display: flex; align-items: center; justify-content: center; padding: 6px;">
                                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="#4b4b4b" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
                                            </button>
                                            <button class="toolbar-button" data-format="Bold" onclick={handleFormat} title="Bold" style="display: flex; align-items: center; justify-content: center; padding: 6px;">
                                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="#4b4b4b" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg>
                                            </button>
                                            <button class="toolbar-button" data-format="Italic" onclick={handleFormat} title="Italic" style="display: flex; align-items: center; justify-content: center; padding: 6px;">
                                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="#4b4b4b" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg>
                                            </button>
                                            <button class="toolbar-button" data-format="Strikethrough" onclick={handleFormat} title="Strikethrough" style="display: flex; align-items: center; justify-content: center; padding: 6px;">
                                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="#4b4b4b" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M17 6.5C17 6.5 15.5 4 12 4C8.5 4 7 6 7 8C7 10 9.5 10.5 12 10.5C14.5 10.5 17 11 17 14C17 17 15.5 20 12 20C8.5 20 7 17.5 7 17.5"></path><line x1="4" y1="12" x2="20" y2="12"></line></svg>
                                            </button>
                                            <button class="toolbar-button" data-format="Code" onclick={handleFormat} title="Code" style="display: flex; align-items: center; justify-content: center; padding: 6px;">
                                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="#4b4b4b" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                                            </button>
                                            
                                            <div class="variable-btn-container" style="display: flex; align-items: center; margin-left: 8px; width: 100%;">
                                                <button class="toolbar-button custom-button richtext" onclick={addvariable} style="display: flex; align-items: center; font-weight: 500; font-size: 15px; color: #1a1a1a; padding: 6px 8px; width: 100%;">
                                                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                                    Add variable
                                                </button>
                                                <lightning-helptext content="Add variables by selecting columns from your customer list. When your message is sent, the variable will be replaced with data from the column." icon-variant="bare" style="margin-left: 4px; --slds-c-icon-color-foreground-default: #4b4b4b;"></lightning-helptext>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <template if:true={addVar}>
                                    <div class="add-variable">
                                        <div class="body-title">
                                            <p>Variable Samples</p>
                                        </div>
                                        <div class="descp2">
                                            <p>Include samples of all variables in your message to help Meta review your template. Remember not to include any customer information to protect your customer's privacy.</p>
                                        </div>

                                        <div class="body-label">
                                            <p>Body</p>
                                        </div>
                                        
                                        <!-- Single Object Selector - Always shown -->
                                        <div class="object-selector-container">
                                            <label class="object-selector-label">Select Object</label>
                                            <select class="object-dropdown dropdown" onchange={handleObjectChange}>
                                                <template for:each={availableObjectsWithSelection} for:item="object">
                                                    <option key={object.value} value={object.value} selected={object.isSelected}>
                                                        {object.label}
                                                    </option>
                                                </template>
                                            </select>
                                        </div>

                                        <!-- Variables with Flow-style field picker -->
                                        <template for:each={computedVariables} for:item="varItem" for:index="index">
                                            <div key={varItem.id} class="true-div">
                                                <input class="var disabled" type="text" value={varItem.index} readonly />

                                                <!-- Merge Field Selector Component for Body -->
                                                 <div class="merge-field-selector-container">
                                                    <c-wb-merge-field-selector
                                                        selected-object={selectedObject}
                                                        selected-field-path={varItem.field}
                                                        selected-field-label={varItem.fieldLabel}
                                                        max-hierarchy-level={LIMITS.maxHierarchyLevel}
                                                        placeholder="Search fields..."
                                                        data-index={varItem.index}
                                                        data-is-header="false"
                                                        onfieldselected={handleMergeFieldSelected}>
                                                    </c-wb-merge-field-selector>
                                                 </div>
                                                

                                                <!-- Alternate Text / Example Input - Show for both Name and Number types -->
                                                <input type="text" class="alternate-text dropdown border-none"
                                                    placeholder={varItem.placeholderText}
                                                    value={varItem.alternateText}
                                                    data-id={varItem.id} data-index={varItem.index}

                                </div>

                                
                                <div class="codelinktempprev">
                                    <template for:each={buttonList} for:item="button" for:index="index">
    
                                        <div key={button.id} class="button-label-preview button-tabs">
                                            <lightning-icon  icon-name={button.iconName}  class="custom-icon" alternative-text="Icon" size="x-small"></lightning-icon>
                                            <p>{button.btntext}</p>
                                        </div>
                                    </template>
                                    <template for:each={customButtonList} for:item="customButton" for:index="index">
    
                                        <div key={customButton.id} class="button-label-preview button-tabs">
                                            <lightning-icon icon-name={customButton.iconName}  class="custom-icon" alternative-text="Icon" size="x-small"></lightning-icon>
    
                                            <p>{customButton.Cbtntext}</p>
                                        </div>
                                    </template>
                                    <template if:true={showAuthBtn}>
    
                                        <div class="button-label-preview button-tabs">
                                            <lightning-icon  icon-name='utility:copy'  class="custom-icon" alternative-text="Icon" size="x-small"></lightning-icon>
                                            <p>{autoCopyCode}</p>
                                        </div>
                                    </template>
                                    <template if:true={showOneTap}>
    
                                        <div class="button-label-preview button-tabs">
                                            <lightning-icon  icon-name='utility:copy'  class="custom-icon" alternative-text="Icon" size="x-small"></lightning-icon>
                                            <p>{autofilLabel}</p>
                                        </div>
                                    </template>
                                    
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>
    <template if:true={showReviewTemplate}>
        <div class="slds-backdrop slds-backdrop_open"></div>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open language-confirm-modal">
            <div class="slds-modal__container">
                <p class="language-modal-heading">Confirm which languages you're submitting</p>
                
                <!-- modal body start -->
                <div class="slds-modal__content language-modal-body" id="modal-content-id-1">
                    <p class="modal-confirm-subtitle">If you choose not to submit a completed language now, it will not be saved and you'll lose the content.</p>

                    <div class="flex-between">
                        <div class="flex-inline">
                            <p class="language-label">{selectedLanguageLabel}</p>
                        </div>
                        <input type="checkbox" name="languageCheck" checked class="checkbox-zoom">
                    </div>
                </div>

                <!-- modal footer start-->
                <footer class="language-modal-footer">
                    <button class="sync-btn sync-btn-cancel" onclick={handleCloseTemplate}>Cancel</button>
                    <button class="sync-btn sync-btn-proceed" onclick={handleSubmit}>Confirm</button>
                </footer>
            </div>
        </section>
    </template>
    <template if:true={isModalPreview}>
        <div class="slds-backdrop slds-backdrop_open"></div>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open language-confirm-modal">
            <div class="slds-modal__container">
                <p class="language-modal-heading">Preview Flow</p>
    
                <div class="slds-modal__content modal-center-content">
                    <div class="preview-box">
                        <iframe src={iframeSrc} class="iframe-preview"></iframe>
                    </div>
                </div>

                <footer class="language-modal-footer">
                    <button class="sync-btn sync-btn-cancel" onclick={closeModal}>Close</button>
                </footer>
            </div>
        </section>
    </template>
</template>
